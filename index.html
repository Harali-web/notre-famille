// ————— Démarrage : passe par l'écran de compte famille (sauf session déjà active) —————

<script id="v30-studio">
/* ===== LOT A — Connexion & croissance ===== */
function v30Membres(){ try{ return (typeof membres!=="undefined"&&Array.isArray(membres))?membres:[]; }catch(e){ return []; } }
function v30Recits(){ try{ return (typeof recits!=="undefined"&&Array.isArray(recits))?recits:[]; }catch(e){ return []; } }
function v30K(n){ try{ if(typeof K==="function") return K("v30-"+n); }catch(e){} return "v30-"+n; }
function v30Get(n,d){ try{ const v=JSON.parse(localStorage.getItem(v30K(n))); return v==null?d:v; }catch(e){ return d; } }
function v30Set(n,v){ try{ localStorage.setItem(v30K(n),JSON.stringify(v)); }catch(e){} }
function v30Toast(t){ try{ if(typeof toast==="function") return toast(t); }catch(e){} }
function v30XP(n,t){ try{ if(typeof gagnerXP==="function") gagnerXP(n,t); }catch(e){} }
function v30Esc(s){ return String(s==null?"":s).replace(/[<>&"]/g,c=>({"<":"&lt;",">":"&gt;","&":"&amp;",'"':"&quot;"}[c])); }

function v30DessinerCarte(){

/* 4 — Calculateur de parenté */
function v30Ancetres(id){ const M=v30Membres(),ch=[]; let p=M.find(m=>m.id===id),g=0;
  while(p){ ch.push({id:p.id,g:g}); if(!p.parentId)break; p=M.find(m=>m.id===p.parentId); g++; if(g>15)break; } return ch; }
function v30Parente(a,b){
  if(a===b) return "la même personne";
  const A=v30Ancetres(a),B=v30Ancetres(b);
  for(const x of A){ const y=B.find(z=>z.id===x.id);
    if(y){ const i=x.g,j=y.g;
      if(i===0) return j===1?"son parent":"son "+(j===2?"grand-parent":"ancêtre ("+j+" générations)");
      if(j===0) return i===1?"son enfant":"son "+(i===2?"petit-enfant":"descendant ("+i+" générations)");
      if(i===1&&j===1) return "frères / sœurs";
      if(i===1&&j===2||i===2&&j===1) return "oncle-tante / neveu-nièce";
      if(i===2&&j===2) return "cousins germains";
      return "cousins ("+Math.max(i,j)+"e degré)";
    } }
  return "aucun lien trouvé dans l'arbre (branches différentes)";
}

/* 5 — Annuaire des branches */
function v30VueBranches(){

/* 10 — Dictionnaire familial */
function v30VueDico(){
  const mots=v30Get("dico",[]);
  let html=`<h3>📖 Dictionnaire de la famille</h3>

function v30VueVraiFaux(){

  ${dejaJoue?`<div class="v30-carte">Déjà joué aujourd'hui — reviens demain ! 🔥</div>`:
  `<button class="v30-btn v30-vert" onclick="v30RepVF(true,${seed})">VRAI</button>
   <button class="v30-btn v30-rouge" onclick="v30RepVF(false,${seed})">FAUX</button>`}
  <div id="v30-vf-res"></div>`;

function v30RepVF(rep,seed){

  const el=document.getElementById("v30-vf-res");
  if(el) el.innerHTML=`<div class="v30-carte">${gagne?"✅ Bonne réponse !":"❌ Raté !"} ${v30Esc(q.nom)} est né(e) en <b>${v30Esc(q.vraiAn)}</b>.</div>`;

/* 12 — Memory des visages */
function v30VueMemory(){
  const P=v30Membres().filter(m=>m.photo).slice(0,6);
  if(P.length<3) return `<h3>🃏 Memory des visages</h3><div class="v30-carte">Ajoute au moins 3 photos de membres pour jouer.</div>`;
  const cartes=[]; P.forEach((m,i)=>{ cartes.push({k:i,p:m.photo},{k:i,p:m.photo}); });
  for(let i=cartes.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [cartes[i],cartes[j]]=[cartes[j],cartes[i]]; }
  window.__v30mem={cartes:cartes,ouvertes:[],trouvees:[]};
  let html=`<h3>🃏 Memory des visages</h3>
  <p class="v30-p">Retrouve les paires de visages de ta famille.</p><div class="v30-grille">`;
  cartes.forEach((c,i)=>{ html+=`<div class="v30-memcarte" id="v30-mc-${i}" onclick="v30MemClic(${i})">❦</div>`; });
  return html+`</div><div id="v30-mem-res"></div>`;
}
function v30MemClic(i){
  const g=window.__v30mem; if(!g||g.trouvees.includes(i)||g.ouvertes.includes(i)||g.ouvertes.length>=2) return;
  const el=document.getElementById("v30-mc-"+i);
  el.innerHTML=`<img src="${g.cartes[i].p}" style="width:100%;height:100%;object-fit:cover;border-radius:8px">`;
  g.ouvertes.push(i);
  if(g.ouvertes.length===2){ const [a,b]=g.ouvertes;
    setTimeout(function(){
      if(g.cartes[a].k===g.cartes[b].k){ g.trouvees.push(a,b);
        if(g.trouvees.length===g.cartes.length){
          document.getElementById("v30-mem-res").innerHTML=`<div class="v30-carte">🏆 Bravo, toutes les paires trouvées !</div>`;
          v30XP(20,"Memory terminé"); }
      } else { [a,b].forEach(x=>{ document.getElementById("v30-mc-"+x).innerHTML="❦"; }); }
      g.ouvertes=[];
    },700); }
}

function v30VuePendu(){

  <div class="v30-clavier">${"ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").map(l=>

function v30PenduLettre(l){

  else { g.rate++; document.getElementById("v30-pendu-vies").textContent="❤️".repeat(Math.max(0,6-g.rate))+"🖤".repeat(g.rate); }
  const aff=g.mot.split("").map(c=>g.trouve.includes(c)?c:"_").join(" ");

  const res=document.getElementById("v30-pendu-res");
  if(!aff.includes("_")){ res.innerHTML=`<div class="v30-carte">🏆 Trouvé : <b>${g.mot}</b> !</div>`; v30XP(15,"Pendu gagné"); }
  else if(g.rate>=6){ res.innerHTML=`<div class="v30-carte">💀 Perdu — c'était <b>${g.mot}</b>.</div>`; }
}

/* 20 — Pyramide des générations */
function v30VuePyramide(){
  const M=v30Membres(); const niveaux={};
  M.forEach(m=>{ let g=0,p=m; const vus={};
    while(p&&p.parentId&&!vus[p.id]){ vus[p.id]=1; p=M.find(q=>q.id===p.parentId); g++; if(g>12)break; }
    niveaux[g]=(niveaux[g]||0)+1; });
  const max=Math.max.apply(null,Object.values(niveaux).concat([1]));
  let html=`<h3>🔺 La pyramide des générations</h3>
  <p class="v30-p">Combien de membres à chaque étage de l'arbre. <em>Exemple : Génération 3 — 14 membres.</em></p>`;
  Object.keys(niveaux).sort((a,b)=>a-b).forEach(g=>{
    html+=`<div class="v30-carte">Génération ${parseInt(g)+1} — <b>${niveaux[g]}</b>
    <div class="v30-barre"><span style="width:${Math.round(100*niveaux[g]/max)}%"></span></div></div>`; });
  return html;
}

function v30Exporter(){

function v30Importer(ev){

    if(!d||!Array.isArray(d.membres)) return v30Toast("Fichier non reconnu");
    if(!confirm("Remplacer les données actuelles par cette sauvegarde ("+d.membres.length+" membres) ?")) return;
    try{ membres=d.membres; if(Array.isArray(d.recits)) recits=d.recits;
      if(typeof sauverRegistre==="function"&&typeof chargerRegistre==="function"){}
      localStorage.setItem((typeof CLE!=="undefined"?CLE:"famille-web-v1"),JSON.stringify(membres));
      if(typeof CLE_RECITS!=="undefined") localStorage.setItem(CLE_RECITS,JSON.stringify(recits));

}

/* ===== LOT F — Vie sonore & célébrations ===== */
var __v31ctx=null;
function v31Ctx(){ try{ if(!__v31ctx){ var AC=window.AudioContext||window.webkitAudioContext; if(AC) __v31ctx=new AC(); } return __v31ctx; }catch(e){ return null; } }
function v31Pref(n,d){ var v=v30Get("pref-"+n,null); return v===null?d:v; }

/* 26 — Sons d'interface (générés, aucun fichier audio) */
function v31Bip(freq,duree,type,vol,quand){
  var c=v31Ctx(); if(!c||!v31Pref("sons",true)) return;
  try{
    var o=c.createOscillator(), g=c.createGain(), t=(c.currentTime+(quand||0));
    o.type=type||"sine"; o.frequency.setValueAtTime(freq,t);
    g.gain.setValueAtTime(0.0001,t);
    g.gain.exponentialRampToValueAtTime(vol||0.12,t+0.012);
    g.gain.exponentialRampToValueAtTime(0.0001,t+(duree||0.09));
    o.connect(g); g.connect(c.destination); o.start(t); o.stop(t+(duree||0.09)+0.02);
  }catch(e){}
}
function v31Son(type){
  if(type==="clic") v31Bip(520,0.05,"triangle",0.07);
  else if(type==="succes"){ v31Bip(523,0.09,"sine",0.1); v31Bip(659,0.09,"sine",0.1,0.09); v31Bip(784,0.14,"sine",0.12,0.18); }
  else if(type==="niveau"){ [523,659,784,1046].forEach(function(f,i){ v31Bip(f,0.16,"sine",0.13,i*0.13); }); }
  else if(type==="erreur") v31Bip(180,0.16,"square",0.06);
}

function v31Vibrer(ms){ try{ if(v31Pref("vibrations",true)&&navigator.vibrate) navigator.vibrate(ms); }catch(e){} }

/* 28 — Confettis de célébration */
function v31Confetti(){
  try{
    if(!v31Pref("confettis",true)) return;
    var cv=document.createElement("canvas");
    cv.style.cssText="position:fixed;inset:0;pointer-events:none;z-index:99999";
    cv.width=innerWidth; cv.height=innerHeight; document.body.appendChild(cv);
    var x=cv.getContext("2d"), cols=["#C9962E","#2B3A32","#8A3B2E","#4A6B3F","#F1EEE5"];
    var p=[]; for(var i=0;i<90;i++) p.push({x:Math.random()*cv.width,y:-20-Math.random()*cv.height*0.4,
      v:2+Math.random()*3.5,r:3+Math.random()*5,a:Math.random()*6.28,c:cols[i%cols.length]});
    var n=0;
    (function anim(){ n++; x.clearRect(0,0,cv.width,cv.height);
      p.forEach(function(q){ q.y+=q.v; q.a+=0.12; x.save(); x.translate(q.x,q.y); x.rotate(q.a);
        x.fillStyle=q.c; x.fillRect(-q.r,-q.r/2,q.r*2,q.r); x.restore(); });
      if(n<130) requestAnimationFrame(anim); else cv.remove();
    })();
  }catch(e){}
}
