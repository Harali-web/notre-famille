<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notre famille — Arbre généalogique</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2B3A32">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Famille">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<style>
  :root{
    --barre:#EDE8DA; --fond:#F1EEE5; --encre:#241F16; --vert:#2B3A32; --vert-clair:#B9C4B4;
    --laiton:#C9962E; --carte:#FBFAF5; --bord:#DDD5C2; --gris:#6B6250;
    --bord2:#C9C0AB; --rouge:#8A3B2E;
  }
  body.sombre{--fond:#171A17;--encre:#E8E4D8;--vert:#101710;--vert-clair:#8FA089;
    --carte:#22261F;--bord:#3A4034;--gris:#A59D88;--bord2:#4A5142;--laiton:#D4A238;
    --rouge:#C05540;--barre:#33382E}
  body.sombre .champ,body.sombre .bouton-genre,body.sombre textarea.champ{background:#2C312A;color:#E8E4D8;border-color:#4A5142}
  body.sombre .noeud.surligne{background:#3A3524}
  body.sombre .chip{background:#3A3524}
  body.sombre .ligne-resultat{border-bottom-color:#3A4034;color:#E8E4D8}
  body.sombre .fiche{border-top-color:#3A4034}
  body.sombre .ligne-fiche{color:#D8D2C2}
  body.sombre .notes-texte{color:#B8B09A}
  body.sombre #livret{background:#fff}
  *{box-sizing:border-box}
  button{transition:transform .1s ease}
  button:active{transform:scale(.96)}
  @keyframes apparition{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  #contenu.anim{animation:apparition .28s ease}
  .badge-item{width:calc(33.4% - 6px);background:var(--fond);border:1px solid var(--bord);
    border-radius:10px;padding:8px 5px;text-align:center}
  .badge-item.verrou{opacity:.38;filter:grayscale(1)}
  .voile{position:fixed;inset:0;background:rgba(15,18,14,.62);display:flex;
    align-items:center;justify-content:center;z-index:50;padding:24px}
  .guide-carte{max-width:340px;width:100%;background:var(--carte);border:1px solid var(--bord);
    border-radius:16px;padding:26px 22px;text-align:center;animation:apparition .3s ease}
  .points{display:flex;gap:6px;justify-content:center;margin:14px 0}
  .points span{width:8px;height:8px;border-radius:50%;background:var(--bord2)}
  .points span.actif{background:var(--laiton)}
  #hors-ligne{display:none;background:var(--rouge);color:#fff;text-align:center;
    font-size:12px;font-weight:600;padding:4px 0}
  #hors-ligne.actif{display:block}
  .duel-carte{flex:1;background:var(--carte);border:2px solid var(--bord);border-radius:14px;
    padding:14px 10px;text-align:center;cursor:pointer}
  .duel-carte.gagne{border-color:#4A5A45;background:#eaf1e8}
  .duel-carte.perdu{border-color:var(--rouge);opacity:.55}
  .etoile-fav{background:none;border:none;font-size:18px;cursor:pointer;padding:0 4px}
  .puce-filtre{display:inline-block;padding:5px 10px;border-radius:16px;border:1px solid var(--bord2);
    font-size:12.5px;margin:0 4px 6px 0;background:var(--carte);cursor:pointer}
  .puce-filtre.actif{background:var(--laiton);border-color:var(--laiton);color:var(--encre);font-weight:700}
  .badge-nouveau{background:var(--laiton);color:var(--encre);font-size:10px;font-weight:700;
    border-radius:8px;padding:1px 6px;margin-left:6px;vertical-align:middle}
  body.sombre .duel-carte.gagne{background:#233024}
  #toast{position:fixed;left:0;right:0;bottom:76px;display:flex;justify-content:center;
    pointer-events:none;z-index:60;padding:0 20px}
  .toast-int{background:var(--vert);color:var(--fond);padding:10px 18px;border-radius:20px;
    font-size:13.5px;font-weight:600;animation:apparition .25s ease;box-shadow:0 4px 14px rgba(0,0,0,.3)}
  .fete{position:relative;height:0;pointer-events:none}
  .fete span{position:absolute;top:0;font-size:20px;animation:tomber 1.7s ease-out forwards}
  @keyframes tomber{from{transform:translateY(-12px) rotate(0);opacity:1}
    to{transform:translateY(80px) rotate(50deg);opacity:0}}
  body{margin:0;background:var(--fond);color:var(--encre);
    font-family:system-ui,-apple-system,'Segoe UI',sans-serif}
  .app{max-width:520px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
  header{background:var(--vert);color:var(--fond);padding:22px 18px 14px}
  .titre{font-family:Georgia,'Times New Roman',serif;font-size:26px;letter-spacing:.3px}
  .sous-titre{font-size:13px;color:var(--vert-clair);margin-top:3px}
  main{flex:1;padding:16px 16px 90px}
  nav{position:sticky;bottom:0;display:flex;gap:6px;background:var(--vert);
    padding:6px 8px calc(6px + env(safe-area-inset-bottom))}
  nav button{flex:1;padding:12px 4px;border:none;border-radius:10px;background:transparent;
    color:var(--vert-clair);font-size:14px;font-weight:600;cursor:pointer}
  nav button.actif{background:var(--laiton);color:var(--encre)}
  .aide{font-size:13.5px;color:var(--gris);margin:0 0 12px;line-height:1.45}
  .champ{width:100%;padding:12px 10px;border-radius:10px;border:1px solid var(--bord2);
    font-size:15px;background:#fff;color:var(--encre)}
  textarea.champ{resize:vertical;font-family:inherit}
  .carte{background:var(--carte);border:1px solid var(--bord);border-radius:12px;padding:14px}
  .noeud{display:flex;align-items:center;gap:8px;background:var(--carte);
    border:1px solid var(--bord);border-radius:10px;padding:10px 12px;width:100%;
    text-align:left;font-size:15px;color:var(--encre);cursor:pointer}
  .noeud.surligne{border:2px solid var(--laiton);background:#FDF6E7}
  .branche{margin-left:18px;border-left:2px solid #C9B98A;padding-left:12px;margin-top:6px}
  .branche.racine{margin-left:0;border-left:none;padding-left:0}
  .pastille{display:inline-flex;align-items:center;justify-content:center;width:24px;height:24px;
    border-radius:50%;font-size:11.5px;font-weight:700;color:#fff;flex-shrink:0}
  .pastille.H{background:#3E5A78}.pastille.F{background:#7A4A6B}
  .avatar{width:24px;height:24px;border-radius:50%;object-fit:cover;flex-shrink:0;
    border:1px solid var(--bord2);background:#fff}
  .annee{font-weight:400;font-size:13px;color:#8B8371}
  .compteur{margin-left:auto;font-size:13px;color:#8B8371}
  .bouton-principal{width:100%;margin-top:12px;padding:13px 0;border-radius:10px;border:none;
    background:var(--laiton);color:var(--encre);font-size:15.5px;font-weight:700;cursor:pointer}
  .bouton-secondaire{width:100%;margin-top:8px;padding:11px 0;border-radius:10px;
    border:1px solid var(--bord2);background:transparent;color:var(--gris);
    font-size:14px;font-weight:600;cursor:pointer}
  .bouton-danger{width:100%;margin-top:16px;padding:12px 0;border-radius:10px;
    border:1px solid var(--rouge);background:transparent;color:var(--rouge);
    font-size:14px;font-weight:600;cursor:pointer}
  .bouton-genre{flex:1;padding:10px 0;border-radius:10px;border:1px solid var(--bord2);
    background:#fff;font-size:14px;font-weight:600;cursor:pointer;color:var(--encre)}
  .bouton-genre.actif{background:var(--vert);color:var(--fond);border-color:var(--vert)}
  .bouton-action{border:1px solid var(--vert);background:var(--vert);color:var(--fond);
    border-radius:8px;padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer}
  .bouton-retirer{border:1px solid var(--bord2);background:transparent;border-radius:8px;
    padding:7px 12px;font-size:12.5px;color:var(--gris);cursor:pointer}
  .message{margin-top:10px;font-size:13.5px;color:#4A5A45}
  .vide{background:var(--carte);border:1px dashed var(--bord2);border-radius:12px;
    padding:18px 14px;font-size:14px;color:var(--gris);text-align:center}
  .carte-lignee{background:var(--carte);border:1px solid var(--bord);border-radius:12px;
    padding:12px 14px}
  .carte-lignee.dernier{background:var(--laiton);border-color:#B08324}
  .etiquette-gen{font-size:11.5px;text-transform:uppercase;letter-spacing:1px;
    color:var(--gris);margin-bottom:3px}
  .fil{width:2px;height:22px;background:var(--laiton);margin:0 auto}
  .resultat{margin-top:18px;background:var(--carte);border:1px solid var(--bord);
    border-radius:12px;padding:14px 16px;font-size:15.5px;line-height:1.5}
  .liste-resultats{margin-top:6px;background:var(--carte);border:1px solid var(--bord);
    border-radius:10px;overflow:hidden;max-height:260px;overflow-y:auto}
  .ligne-resultat{display:flex;align-items:center;gap:8px;width:100%;padding:10px 12px;
    border:none;border-bottom:1px solid #EDE8DA;background:transparent;font-size:15px;
    text-align:left;cursor:pointer;color:var(--encre)}
  .chip{display:flex;align-items:center;gap:8px;background:#FDF6E7;
    border:1px solid var(--laiton);border-radius:10px;padding:9px 12px;font-size:15px}
  .carte-membre{background:var(--carte);border:1px solid var(--bord);border-radius:10px;
    margin-bottom:6px;overflow:hidden}
  .ligne-membre{display:flex;align-items:center;gap:10px;width:100%;padding:10px 12px;
    border:none;background:transparent;font-size:15px;cursor:pointer;color:var(--encre)}
  .fiche{padding:0 12px 12px;border-top:1px solid #EDE8DA}
  .ligne-fiche{font-size:13.5px;color:#3E3A2E;margin-top:7px;line-height:1.4}
  .etiquette-champ{font-size:12.5px;color:var(--gris);margin-bottom:5px}
  .rangee{display:flex;gap:8px}
  .notes-texte{font-size:13px;color:#5A5344;margin-top:4px;font-style:italic}
  .mt10{margin-top:10px}.mt18{margin-top:18px}.mb10{margin-bottom:10px}
  #livret{background:#fff;color:#241F16;max-width:560px;margin:0 auto;
    padding:20px;font-size:14px;line-height:1.5}
  #livret h2{font-family:Georgia,'Times New Roman',serif;font-size:20px;
    border-bottom:2px solid var(--laiton);padding-bottom:6px;margin:28px 0 14px}
  .fiche-livret{border:1px solid #DDD5C2;border-radius:10px;padding:10px 12px;
    margin-bottom:8px;page-break-inside:avoid}
  @media print{
    .no-print{display:none!important}
    .saut{page-break-before:always}
    body{background:#fff}
    #livret{max-width:none;padding:0}
  }
</style>
</head>
<body>
<div id="hors-ligne">📡 Hors ligne — vous consultez les dernières données enregistrées sur cet appareil</div>
<div class="app" id="appli">
  <header>
    <div style="display:flex;align-items:center;gap:10px">
      <div style="flex:1">
        <div class="titre"><span id="avatar-famille"></span>Notre famille</div>
        <div class="sous-titre" id="stats"></div>
        <div class="sous-titre" id="sync"></div>
      </div>
      <button onclick="ouvrirRecherche()" style="border:1px solid var(--vert-clair);
        background:transparent;color:var(--fond);border-radius:8px;padding:8px 10px;font-size:14px;
        cursor:pointer;flex-shrink:0">🔍</button>
      <button onclick="ouvrirGuide()" style="border:1px solid var(--vert-clair);
        background:transparent;color:var(--fond);border-radius:8px;padding:8px 10px;font-size:14px;
        cursor:pointer;flex-shrink:0">❓</button>
      <button id="btn-theme" onclick="basculerTheme()" style="border:1px solid var(--vert-clair);
        background:transparent;color:var(--fond);border-radius:8px;padding:8px 10px;font-size:14px;
        cursor:pointer;flex-shrink:0">🌙</button>
      <button id="btn-actualiser" onclick="actualiser()" style="display:none;border:1px solid var(--vert-clair);
        background:transparent;color:var(--fond);border-radius:8px;padding:8px 12px;font-size:12.5px;
        font-weight:600;cursor:pointer;flex-shrink:0">Actualiser</button>
    </div>
  </header>
  <main id="contenu" ontouchstart="swipeDebut(event)" ontouchend="swipeFin(event)"></main>
  <nav id="nav"></nav>
</div>
<div id="livret" style="display:none"></div>
<div id="guide"></div>
<div id="recherche"></div>
<div id="admin"></div>
<div id="toast"></div>
<div id="decouv"></div>
<div id="diapo"></div>
<div id="recap"></div>
<div id="duel"></div>
<div id="auth"></div>

<script>
"use strict";
// ————— Base de données familiale (Supabase) —————
// Pour connecter le site à la base commune, remplissez ces deux lignes
// (exemple : "https://abcdefgh.supabase.co" et la clé "anon public") :
const SUPABASE_URL = "";
const SUPABASE_KEY = "";
const CLOUD_ACTIF = SUPABASE_URL.indexOf("https://") === 0 && SUPABASE_KEY.length > 20;

function majSync(t){
  const e=document.getElementById("sync"); if(e) e.textContent=t;
  const b=document.getElementById("btn-actualiser"); if(b) b.style.display=CLOUD_ACTIF?"block":"none";
}
async function chargerCloud(){
  if(!CLOUD_ACTIF) return;
  majSync("Connexion à la base familiale…");
  try{
    const r=await fetch(SUPABASE_URL+"/rest/v1/stockage?cle=in.(membres,recits)&select=cle,valeur",
      {headers:{apikey:SUPABASE_KEY,Authorization:"Bearer "+SUPABASE_KEY}});
    if(!r.ok) throw new Error("HTTP "+r.status);
    const lignes=await r.json();
    for(const l of lignes){
      try{
        const v=JSON.parse(l.valeur);
        if(l.cle==="membres" && Array.isArray(v)) membres=v;
        if(l.cle==="recits" && Array.isArray(v)) recits=v;
      }catch(e){}
    }
    try{ localStorage.setItem(CLE,JSON.stringify(membres));
         localStorage.setItem(CLE_RECITS,JSON.stringify(recits)); }catch(e){}
    rendre();
    majSync("Connecté · arbre familial partagé");
  }catch(e){ majSync("Hors ligne — données de cet appareil affichées"); }
}
async function pousserCloud(){
  if(!CLOUD_ACTIF) return;
  try{
    const r=await fetch(SUPABASE_URL+"/rest/v1/stockage",{method:"POST",
      headers:{apikey:SUPABASE_KEY,Authorization:"Bearer "+SUPABASE_KEY,
        "Content-Type":"application/json","Prefer":"resolution=merge-duplicates"},
      body:JSON.stringify([{cle:"membres",valeur:JSON.stringify(membres)},
        {cle:"recits",valeur:JSON.stringify(recits)}])});
    if(!r.ok) throw new Error("HTTP "+r.status);
    majSync("Connecté · modifications partagées avec la famille");
  }catch(e){ majSync("⚠ Envoi impossible — vos changements restent sur cet appareil"); }
}
function actualiser(){ chargerCloud(); }

// ————— Données —————
// ————— Comptes famille : ces clés sont attribuées dynamiquement après authentification —————
let CLE, CLE_RECITS, CLE_RECORD, CLE_THEME, CLE_SERIE, CLE_ACCUEIL, CLE_JOURNAL, CLE_EXPORT, CLE_EVT, CLE_ADMIN, CLE_XP, CLE_XPSEM, CLE_QJ, CLE_QJSERIE, CLE_ADEC, CLE_SERIE_MAX, CLE_QJSERIE_MAX, CLE_XPJOUR, CLE_XPJOUR_RECORD, CLE_NOTIF, CLE_DERNIERE_OUVERTURE, CLE_RECAP_VU, CLE_BADGE_NUIT, CLE_DUEL_RECORD;
// ————— Comptes famille : plusieurs familles peuvent utiliser le même appareil —————
const CLE_REGISTRE = "familles-registre-v1"; // jamais préfixée : registre commun de toutes les familles
const CLE_SESSION = "famille-session-active-v1"; // jamais préfixée : quelle famille est connectée ici
let FAMILLE_ID = "";
let FAMILLE_NOM = "";
function slugFamille(nom){
  return normaliser(nom).replace(/[^a-z0-9]+/g,"-").replace(/^-+|-+$/g,"");
}
function hashSimple(texte){
  let h=0;
  for(let i=0;i<texte.length;i++){ h=((h<<5)-h+texte.charCodeAt(i))|0; }
  return String(h);
}
function K(suffixe){ return "fam-"+FAMILLE_ID+"-"+suffixe; }
function chargerRegistre(){
  try{ return JSON.parse(localStorage.getItem(CLE_REGISTRE))||[]; }catch(e){ return []; }
}
function sauverRegistre(reg){
  try{ localStorage.setItem(CLE_REGISTRE, JSON.stringify(reg)); }catch(e){}
}
function initClesFamille(){
  CLE = K("famille-web-v1");
  CLE_RECITS = K("famille-web-recits-v1");
  CLE_RECORD = K("famille-web-quiz-record");
  CLE_THEME = K("famille-web-theme");
  CLE_SERIE = K("famille-web-serie");
  CLE_ACCUEIL = K("famille-web-accueil-vu");
  CLE_JOURNAL = K("famille-web-journal");
  CLE_EXPORT = K("famille-web-dernier-export");
  CLE_EVT = K("famille-web-evenement");
  CLE_ADMIN = K("famille-web-admin-pin");
  CLE_XP = K("famille-web-xp");
  CLE_XPSEM = K("famille-web-xp-semaine");
  CLE_QJ = K("famille-web-question-jour");
  CLE_QJSERIE = K("famille-web-question-serie");
  CLE_ADEC = K("famille-web-a-decouvrir");
  CLE_SERIE_MAX = K("famille-web-serie-max");
  CLE_QJSERIE_MAX = K("famille-web-qj-serie-max");
  CLE_XPJOUR = K("famille-web-xp-jour");
  CLE_XPJOUR_RECORD = K("famille-web-xp-jour-record");
  CLE_NOTIF = K("famille-web-notif");
  CLE_DERNIERE_OUVERTURE = K("famille-web-derniere-ouverture");
  CLE_RECAP_VU = K("famille-web-recap-vu");
  CLE_BADGE_NUIT = K("famille-web-badge-nuit");
  CLE_DUEL_RECORD = K("famille-web-duel-record");
}
// ————— Mode Découverte : cartes de membres façon Tinder —————
let decouvXP=false;
// ————— Mode Duel : qui est le plus âgé / a le plus d'enfants ? —————
function candidatsDuel(){ return membres.filter(function(m){ return m.annee && /^\d{4}$/.test(m.annee); }); }
function tirerDuel(){
  const c=candidatsDuel();
  if(c.length<2) return null;
  const i=Math.floor(Math.random()*c.length);
  let j=Math.floor(Math.random()*c.length);
  if(j===i) j=(j+1)%c.length;
  const a=c[i], b=c[j];
  const typeAge=Math.random()<0.7 || true; // priorité à l'âge (donnée la plus fiable)
  const plusAge=(+a.annee)<(+b.annee)?a.id:b.id; // né avant = plus âgé
  return {a:a.id, b:b.id, question:"Qui est le plus âgé ?", bonne:plusAge};
}
function lancerDuel(){
  const d=tirerDuel();
  if(!d){ etat.messageRecit="Il faut au moins 2 membres avec une année de naissance pour un duel."; rendre(); return; }
  etat.duel={d:d, choix:null};
  rendreDuel();
}
function fermerDuel(){ etat.duel=null; rendreDuel(); }
function choisirDuel(id){
  const dv=etat.duel; if(!dv || dv.choix) return;
  dv.choix=id;
  const correct=id===dv.d.bonne;
  if(correct){
    etat.duelStreak=(etat.duelStreak||0)+1;
    let rec=0; try{ rec=+localStorage.getItem(CLE_DUEL_RECORD)||0; }catch(e){}
    if(etat.duelStreak>rec){ try{ localStorage.setItem(CLE_DUEL_RECORD,String(etat.duelStreak)); }catch(e){} }
    gagnerXP(8,"Duel gagné");
  } else {
    etat.duelStreak=0;
  }
  rendreDuel();
}
function duelSuivant(){
  const d=tirerDuel();
  if(!d){ fermerDuel(); return; }
  etat.duel={d:d, choix:null};
  rendreDuel();
}
function rendreDuel(){
  const el=document.getElementById("duel"); if(!el) return;
  const dv=etat.duel;
  if(!dv){ el.innerHTML=""; return; }
  const a=membres.find(function(x){return x.id===dv.d.a;});
  const b=membres.find(function(x){return x.id===dv.d.b;});
  const carte=function(m){
    const choisi=dv.choix===m.id;
    const gagne=dv.choix && m.id===dv.d.bonne;
    const perdu=dv.choix && choisi && m.id!==dv.d.bonne;
    return `<button class="duel-carte ${gagne&&dv.choix?"gagne":""} ${perdu?"perdu":""}" onclick="choisirDuel('${m.id}')">
      ${m.photo?`<img src="${m.photo}" style="width:56px;height:56px;border-radius:50%;object-fit:cover">`
        :`<div style="width:56px;height:56px;border-radius:50%;margin:0 auto;background:${m.genre==="F"?"#7A4A6B":"#3E5A78"};color:#fff;display:flex;align-items:center;justify-content:center;font-family:Georgia,serif;font-size:22px">${ech((nomPropre(m)[0]||"?").toUpperCase())}</div>`}
      <div style="font-weight:600;font-size:13.5px;margin-top:6px">${ech(nomPropre(m))}</div>
      ${dv.choix?`<div style="font-size:12px;color:var(--gris);margin-top:2px">${ech(m.annee)}</div>`:""}
    </button>`;
  };
  el.innerHTML=`<div class="voile"><div class="guide-carte" style="max-width:360px">
    <div class="rangee" style="align-items:center">
      <div style="flex:1;font-weight:700;text-align:left">⚔️ ${ech(dv.d.question)}</div>
      <button class="bouton-retirer" onclick="fermerDuel()">✕</button>
    </div>

let adminOk=false, adminAttente=null;
function pinDefini(){ try{ return !!localStorage.getItem(CLE_ADMIN); }catch(e){ return false; } }
function exigerAdmin(nomFn,args){
  if(!pinDefini() || adminOk) return false;
  adminAttente={n:nomFn, a:args||[]};
  rendreAdmin(true);
  return true;
}
function rendreAdmin(ouvert){
  const el=document.getElementById("admin"); if(!el) return;
  if(!ouvert){ el.innerHTML=""; return; }
  el.innerHTML=`<div class="voile"><div class="guide-carte">
    <div style="font-size:36px">🔐</div>

    <p class="aide" style="text-align:center">Entrez le PIN administrateur pour continuer.</p>
    <input class="champ" id="pin-saisie" type="password" inputmode="numeric" placeholder="PIN">
    <div id="pin-erreur" class="message" style="color:var(--rouge)"></div>
    <button class="bouton-principal" onclick="validerAdmin()">Valider</button>
    <button class="bouton-secondaire" onclick="adminAttente=null;rendreAdmin(false)">Annuler</button>
  </div></div>`;
  const e=document.getElementById("pin-saisie"); if(e && e.focus) e.focus();
}
function validerAdmin(){
  const e=document.getElementById("pin-saisie"); if(!e) return;
  let pin=""; try{ pin=localStorage.getItem(CLE_ADMIN)||""; }catch(err){}
  if(e.value!==pin){
    const er=document.getElementById("pin-erreur"); if(er) er.textContent="PIN incorrect.";
    return;
  }
  adminOk=true;
  const p=adminAttente; adminAttente=null;
  rendreAdmin(false);
  const table={supprimer:supprimer, toutEffacer:toutEffacer, supprimerRecit:supprimerRecit,
    importer:importer, effacerEvenement:effacerEvenement, desactiverAdmin:desactiverAdmin};
  if(p && table[p.n]) table[p.n].apply(null,p.a);
  else rendre();
}
function activerAdmin(){
  const e=document.getElementById("pin-nouveau"); if(!e) return;
  const pin=e.value.trim();
  if(!/^\d{4,8}$/.test(pin)){ etat.messageRecit="Le PIN doit contenir 4 à 8 chiffres."; rendre(); return; }
  try{ localStorage.setItem(CLE_ADMIN,pin); }catch(err){}
  adminOk=true;
  consigner("Protection administrateur activée");
  etat.messageRecit=""; rendre();
}
function desactiverAdmin(){
  if(exigerAdmin("desactiverAdmin")) return;
  try{ localStorage.setItem(CLE_ADMIN,""); localStorage.removeItem(CLE_ADMIN); }catch(e){}
  adminOk=false;
  consigner("Protection administrateur désactivée");
  rendre();
}
function verrouillerAdmin(){ adminOk=false; rendre(); }
function carteAdmin(){
  let h=`<div class="carte mt18"><div style="font-weight:700;margin-bottom:8px">👪 Compte : ${ech(FAMILLE_NOM||FAMILLE_ID)}</div>
    <button class="bouton-retirer" style="width:100%;margin-bottom:14px" onclick="deconnecterFamille()">🔀 Changer de famille / se déconnecter</button>
  </div><div class="carte mt18"><div style="font-weight:700;margin-bottom:4px">🔐 Administration</div>`;
  if(!pinDefini()){
    h+=`<p class="aide">Définissez un PIN pour protéger les actions sensibles : tout effacer, supprimer un membre ou un récit, restaurer une sauvegarde, retirer l'événement. Protection contre les maladresses (les données restent lisibles sur l'appareil — les vrais comptes viendront avec la base commune).</p>

  } else {
    h+=`<p class="aide" style="margin-bottom:8px">${adminOk?"🔓 Session administrateur déverrouillée sur cet appareil.":"🔒 Protection active — les actions sensibles demandent le PIN."}</p>

// ————— Rappel quotidien (notification locale, façon Duolingo) —————
let rappelChrono=null;
function notifDispo(){ return typeof Notification!=="undefined"; }
function notifActive(){ try{ return JSON.parse(localStorage.getItem(CLE_NOTIF)||"null")?.actif===true; }catch(e){ return false; } }
async function activerRappel(){
  if(!notifDispo()){ etat.messageRecit="Les notifications ne sont pas prises en charge par ce navigateur."; rendre(); return; }
  const perm=await Notification.requestPermission();
  if(perm!=="granted"){ etat.messageRecit="Permission refusée — impossible d'activer le rappel."; rendre(); return; }
  try{ localStorage.setItem(CLE_NOTIF, JSON.stringify({actif:true,heure:"19:00"})); }catch(e){}
  demarrerVeilleRappel();
  new Notification("Notre famille 🌳",{body:"Rappel activé — un petit coucou chaque soir à 19h, tant que l'app reste ouverte en arrière-plan."});
  consigner("Rappel quotidien activé");
  rendre();
}
function desactiverRappel(){
  try{ localStorage.setItem(CLE_NOTIF, JSON.stringify({actif:false,heure:"19:00"})); }catch(e){}
  if(rappelChrono && typeof clearInterval!=="undefined") clearInterval(rappelChrono);
  consigner("Rappel quotidien désactivé");
  rendre();
}
function demarrerVeilleRappel(){
  if(!notifActive() || !notifDispo() || Notification.permission!=="granted") return;
  if(rappelChrono) return;
  rappelChrono=setInterval(function(){
    const d=new Date();
    const hhmm=String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0");
    let deja=""; try{ deja=localStorage.getItem("famille-web-rappel-envoye")||""; }catch(e){}
    if(hhmm==="19:00" && deja!==dateISO(d)){
      try{ new Notification("Notre famille 🌳",{body:"Une minute pour la mémoire familiale ? Une mission t'attend."}); }catch(e){}
      try{ localStorage.setItem("famille-web-rappel-envoye",dateISO(d)); }catch(e){}
    }
  },60000);
}
function carteRappel(){
  let h=`<div class="carte mt18"><div style="font-weight:700;margin-bottom:4px">🔔 Rappel quotidien</div>`;
  if(!notifDispo()){
    h+=`<p class="aide" style="margin:0">Non pris en charge par ce navigateur.</p></div>`;
    return h;
  }
  if(notifActive()){
    h+=`<p class="aide">Activé — un rappel vers 19h si l'app reste ouverte en arrière-plan.</p>
      <button class="bouton-retirer" style="width:100%" onclick="desactiverRappel()">Désactiver</button></div>`;
  } else {
    h+=`<p class="aide">Reçois un petit rappel le soir pour ne pas manquer ta mission du jour.</p>
      <button class="bouton-principal" style="margin-top:0" onclick="activerRappel()">Activer le rappel</button></div>`;
  }
  return h;
}

function calculerRecap(){
  let derniere=null; try{ derniere=localStorage.getItem(CLE_DERNIERE_OUVERTURE); }catch(e){}
  let dejaVu=""; try{ dejaVu=localStorage.getItem(CLE_RECAP_VU)||""; }catch(e){}
  const auj=dateISO(new Date());
  if(!derniere || derniere===auj || dejaVu===auj) return null;
  const evts=journal.filter(function(e){ return e.d>derniere && e.d<=auj; });
  if(evts.length===0) return null;
  const nbAjouts=evts.filter(function(e){ return e.t.indexOf("ajouté à l'arbre")>=0; }).length;
  const nbRecits=evts.filter(function(e){ return e.t.indexOf("Récit «")>=0; }).length;
  return {depuis:derniere, total:evts.length, nbAjouts:nbAjouts, nbRecits:nbRecits};
}

let diapoChrono=null;
function listeDiapos(){
  const d=[];
  for(const m of membres) d.push({type:"m", id:m.id});
  for(const r of recits) d.push({type:"r", id:r.id});
  return d;
}
function ouvrirDiapo(){
  if(listeDiapos().length===0) return;
  etat.diapo=0;
  if(diapoChrono) clearInterval(diapoChrono);
  diapoChrono=setInterval(function(){ diapoSuivant(); },etat.vitesseReunion||7000);
  rendreDiapo();
}
function fermerDiapo(){
  etat.diapo=null;
  if(diapoChrono){ clearInterval(diapoChrono); diapoChrono=null; }
  rendreDiapo();
}
function diapoSuivant(){
  if(etat.diapo===null) return;
  etat.diapo=(etat.diapo+1)%listeDiapos().length;
  rendreDiapo();
}
function rendreDiapo(){
  const el=document.getElementById("diapo"); if(!el) return;

        :`<div style="width:110px;height:110px;border-radius:50%;background:${m.genre==="F"?"#7A4A6B":"#3E5A78"};color:#fff;display:flex;align-items:center;justify-content:center;font-size:44px;font-family:Georgia,serif;margin:0 auto">${ech((nomPropre(m)[0]||"?").toUpperCase())}</div>`}

      interieur=`<div style="font-size:44px">📖</div>
      <div style="font-family:Georgia,serif;font-size:21px;margin-top:12px">${r.annee?ech(r.annee)+" — ":""}${ech(r.titre)}</div>
      <div style="margin-top:10px;font-size:14.5px;line-height:1.55;text-align:left;white-space:pre-wrap">${ech(r.texte.length>320?r.texte.substring(0,320)+"…":r.texte)}</div>
      ${r.audio?baliseMedia(r.audio,"audio"):""}${r.video?baliseMedia(r.video,"video"):""}`;
    }
  }
  el.innerHTML=`<div class="voile" style="background:rgba(10,12,9,.94)" onclick="diapoSuivant()">
    <div class="guide-carte" style="position:relative">
      <button class="bouton-retirer" style="position:absolute;top:10px;right:10px"
        onclick="event.stopPropagation();fermerDiapo()">✕</button>
      ${interieur}
      <div style="color:var(--gris);font-size:11.5px;margin-top:16px">${(etat.diapo%listeDiapos().length)+1} / ${listeDiapos().length} · touche pour passer</div>
    </div></div>`;
}

// ————— Vibration tactile (façon jeux mobiles) et son de succès —————
function vibrer(motif){ try{ if(navigator.vibrate) navigator.vibrate(motif); }catch(e){} }
function sonActif(){ try{ return localStorage.getItem(K("son"))!=="0"; }catch(e){ return true; } }
function jouerSon(){
  if(!sonActif()) return;
  try{
    const ctx=new (window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.type="sine"; o.frequency.value=880;
    g.gain.setValueAtTime(0.15,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.35);
    o.connect(g); g.connect(ctx.destination);
    o.start(); o.stop(ctx.currentTime+0.35);
  }catch(e){}
}
function toggleSon(){
  try{ localStorage.setItem(K("son"), sonActif()?"0":"1"); }catch(e){}
  rendre();
}

const ORDRE_ONGLETS=["arbre","lignee","lienT","familleT","membresT"];
let swipeDepart=null;
function swipeDebut(e){ swipeDepart=(e.touches?e.touches[0].clientX:e.clientX); }
function swipeFin(e){
  if(swipeDepart===null) return;
  const fin=(e.changedTouches?e.changedTouches[0].clientX:e.clientX);
  const delta=fin-swipeDepart; swipeDepart=null;
  if(Math.abs(delta)<60) return;
  const i=ORDRE_ONGLETS.indexOf(onglet); if(i<0) return;
  const suivant = delta<0 ? Math.min(i+1,ORDRE_ONGLETS.length-1) : Math.max(i-1,0);
  if(suivant!==i) allerA(ORDRE_ONGLETS[suivant]);
}

function creerCompte(){
  const n=document.getElementById("auth-nom-creer"), p1=document.getElementById("auth-mdp-creer"),
        p2=document.getElementById("auth-mdp-confirm"), ind=document.getElementById("auth-indice");
  if(!n||!p1||!p2) return;
  const nom=n.value.trim();
  const slug=slugFamille(nom);
  const err=document.getElementById("auth-erreur");
  if(!nom || slug.length<2){ if(err) err.textContent="Choisis un nom de famille (au moins 2 lettres)."; rendreAuthErreur(); return; }
  if(p1.value.length<4){ if(err) err.textContent="Le mot de passe doit contenir au moins 4 caractères."; rendreAuthErreur(); return; }
  if(p1.value!==p2.value){ if(err) err.textContent="Les deux mots de passe ne correspondent pas."; rendreAuthErreur(); return; }
  const reg=chargerRegistre();
  if(reg.some(function(f){return f.slug===slug;})){
    if(err) err.textContent="Ce nom de famille existe déjà — connecte-toi, ou choisis un nom légèrement différent (ex. avec une ville).";
    rendreAuthErreur(); return;
  }
  reg.push({slug:slug, nom:nom, hash:hashSimple(slug+":"+p1.value), indice:(ind?ind.value.trim():"")});
  sauverRegistre(reg);
  FAMILLE_ID=slug; FAMILLE_NOM=nom;
  try{ localStorage.setItem(CLE_SESSION, slug); }catch(e){}
  initClesFamille();
  document.getElementById("auth").innerHTML="";
  demarrerApplication();
  toast(`🌳 Compte « ${nom} » créé — bienvenue !`);
}
function connecterCompte(){
  const n=document.getElementById("auth-nom-entrer"), p1=document.getElementById("auth-mdp-entrer");
  if(!n||!p1) return;
  const slug=slugFamille(n.value.trim());
  const reg=chargerRegistre();
  const entree=reg.find(function(f){return f.slug===slug;});
  const err=document.getElementById("auth-erreur");
  if(!entree || entree.hash!==hashSimple(slug+":"+p1.value)){
    if(err) err.textContent="Nom de famille ou mot de passe incorrect.";
    rendreAuthErreur(); return;
  }
  FAMILLE_ID=slug; FAMILLE_NOM=entree.nom;
  try{ localStorage.setItem(CLE_SESSION, slug); }catch(e){}
  initClesFamille();
  document.getElementById("auth").innerHTML="";
  demarrerApplication();
  toast(`👋 Bon retour, famille ${entree.nom} !`);
}

function dateISO(d){ return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
let serieJours=1;
function majSerie(){
  let info=null; try{ info=JSON.parse(localStorage.getItem(CLE_SERIE)); }catch(e){}
  const auj=dateISO(new Date());
  const hier=dateISO(new Date(Date.now()-86400000));
  if(info && info.dernier===auj){ serieJours=info.nb||1; }
  else if(info && info.dernier===hier){ serieJours=(info.nb||0)+1; try{ localStorage.setItem(CLE_SERIE, JSON.stringify({dernier:auj, nb:serieJours})); }catch(e){} }
  else { serieJours=1; try{ localStorage.setItem(CLE_SERIE, JSON.stringify({dernier:auj, nb:serieJours})); }catch(e){} }
  let max=0; try{ max=+localStorage.getItem(CLE_SERIE_MAX)||0; }catch(e){}
  if(serieJours>max){ try{ localStorage.setItem(CLE_SERIE_MAX,String(serieJours)); }catch(e){} }
}
function serieMax(){ let m=0; try{ m=+localStorage.getItem(CLE_SERIE_MAX)||0; }catch(e){} return Math.max(m,serieJours); }

}

}

function normaliser(t){return (t||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");}
function ech(t){const d=document.createElement("div");d.textContent=t==null?"":t;return d.innerHTML;}
function parId(){return Object.fromEntries(membres.map(m=>[m.id,m]));}

function chemin(id){
  const p=parId(); const ch=[]; let cur=p[id]; let g=0;
  while(cur && g<60){ ch.push(cur); cur = cur.parentId ? p[cur.parentId] : null; g++; }
  return ch;
}
function ancetresDe(id){ return new Set(chemin(id).slice(1).map(m=>m.id)); }
function profondeurMax(){
  let max = membres.length>0?1:0;
  for(const m of membres){ const p=chemin(m.id).length; if(p>max) max=p; }
  return max;
}

function lien(aId,bId){
  const chA=chemin(aId), chB=chemin(bId);
  const idsB=new Map(chB.map((m,i)=>[m.id,i]));
  let da=-1,db=-1,anc=null;
  for(let i=0;i<chA.length;i++){ if(idsB.has(chA[i].id)){da=i;db=idsB.get(chA[i].id);anc=chA[i];break;} }
  if(!anc) return {texte:"Aucun ancêtre commun trouvé dans l'arbre.",ancetre:null};
  const A=chA[0],B=chB[0],fA=A.genre==="F",fB=B.genre==="F";
  const asc=(n,f)=>n===1?(f?"la mère":"le père"):n===2?(f?"la grand-mère":"le grand-père")
    :"l'arrière-"+"arrière-".repeat(n-3)+(f?"grand-mère":"grand-père");
  const desc=(n,f)=>n===1?(f?"la fille":"le fils"):n===2?(f?"la petite-fille":"le petit-fils")
    :"l'arrière-"+"arrière-".repeat(n-3)+(f?"petite-fille":"petit-fils");
  let t="";
  if(da===0) t=`${A.nom} est ${asc(db,fA)} de ${B.nom}.`;
  else if(db===0) t=`${A.nom} est ${desc(da,fA)} de ${B.nom}.`;
  else if(da===1&&db===1) t=`${A.nom} et ${B.nom} sont ${fA&&fB?"sœurs":"frères"} (ou frère et sœur) — même parent dans la lignée.`;
  else if(da===1&&db===2) t=`${A.nom} est ${fA?"la tante":"l'oncle"} de ${B.nom}.`;
  else if(da===2&&db===1) t=`${A.nom} est ${fA?"la nièce":"le neveu"} de ${B.nom}.`;
  else if(da===1&&db>=3) t=`${A.nom} est ${fA?"la grand-tante":"le grand-oncle"} de ${B.nom}.`;
  else if(da>=3&&db===1) t=`${A.nom} est ${fA?"la petite-nièce":"le petit-neveu"} de ${B.nom}.`;
  else if(da===2&&db===2) t=`${A.nom} et ${B.nom} sont cousins germains (cousins directs).`;
  else if(da===db) t=`${A.nom} et ${B.nom} sont cousins au ${da-1}ᵉ degré.`;
  else { const deg=Math.min(da,db)-1, ec=Math.abs(da-db);
    t=`${A.nom} et ${B.nom} sont cousins éloignés : cousins au ${deg}ᵉ degré, avec ${ec} génération${ec>1?"s":""} d'écart.`; }
  return {texte:t,ancetre:anc};
}

async function exporterCartePNG(id){
  const m=membres.find(x=>x.id===id); if(!m || typeof document.createElement!=="function") return;
  const c=document.createElement("canvas"); c.width=600; c.height=750;
  const ctx=c.getContext && c.getContext("2d"); if(!ctx) return;
  ctx.fillStyle="#2B3A32"; ctx.fillRect(0,0,600,750);
  ctx.strokeStyle="#C9962E"; ctx.lineWidth=4; ctx.strokeRect(20,20,560,710);
  ctx.fillStyle="#C9962E"; ctx.font="bold 34px Georgia"; ctx.textAlign="center";
  ctx.fillText(nomPropre(m), 300, 480);
  ctx.fillStyle="#F1EEE5"; ctx.font="20px sans-serif";
  let ligne=520;
  if(m.annee){ ctx.fillText("Né(e) en "+m.annee+(m.decede?" · 🕊 "+(m.anneeDeces||""):""), 300, ligne); ligne+=32; }
  if(m.lieu){ ctx.fillText("📍 "+m.lieu, 300, ligne); ligne+=32; }
  ctx.font="italic 16px sans-serif"; ctx.fillText("— Notre famille 🌳 —", 300, 700);
  if(m.photo){
    try{
      const img=new Image();
      await new Promise(function(res){ img.onload=res; img.onerror=res; img.src=m.photo; });
      ctx.save(); ctx.beginPath(); ctx.arc(300,260,140,0,Math.PI*2); ctx.clip();
      ctx.drawImage(img,160,120,280,280);
      ctx.restore();
    }catch(e){}
  }
  ctx.strokeStyle="#C9962E"; ctx.lineWidth=5; ctx.beginPath(); ctx.arc(300,260,140,0,Math.PI*2); ctx.stroke();
  return new Promise(function(res){
    if(c.toBlob) c.toBlob(function(blob){ res(blob); }); else res(null);
  });
}

// — Question du jour (une seule par jour, comme Wordle) —
function questionDuJour(){
  const avecAnnee=membres.filter(m=>m.annee && /^\d{4}$/.test(m.annee));
  const avecParent=membres.filter(m=>m.parentId);
  const type=Math.floor(aleaJour(1)*3);
  const p=parId();
  if(type===0 && avecAnnee.length){
    const m=avecAnnee[Math.floor(aleaJour(2)*avecAnnee.length)];
    const an=+m.annee;
    const distracteurs=[an+3,an-4,an+7];
    const pos=Math.floor(aleaJour(3)*4);
    const options=distracteurs.slice(0,pos).concat([an]).concat(distracteurs.slice(pos)).map(String);
    return {texte:`En quelle année est né(e) ${nomPropre(m)} ?`, options, bonne:pos};
  }
  if(type===1 && avecParent.length>=1 && membres.length>=4){
    const m=avecParent[Math.floor(aleaJour(2)*avecParent.length)];
    const autres=membres.filter(x=>x.id!==m.parentId && x.id!==m.id);
    const d1=autres[Math.floor(aleaJour(3)*autres.length)];
    let d2=autres[Math.floor(aleaJour(4)*autres.length)];
    if(d2.id===d1.id) d2=autres[(autres.indexOf(d1)+1)%autres.length];
    const pos=Math.floor(aleaJour(5)*3);
    const dist=[nomPropre(d1),nomPropre(d2)];
    const options=dist.slice(0,pos).concat([nomPropre(p[m.parentId])]).concat(dist.slice(pos));
    return {texte:`Qui est le parent de ${nomPropre(m)} dans l'arbre ?`, options, bonne:pos};
  }
  const parents=membres.filter(m=>membres.some(x=>x.parentId===m.id));
  if(parents.length){
    const m=parents[Math.floor(aleaJour(2)*parents.length)];
    const n=membres.filter(x=>x.parentId===m.id).length;
    const pos=Math.floor(aleaJour(3)*4);
    const dist=[Math.max(0,n-1),n+1,n+2];
    const options=dist.slice(0,pos).concat([n]).concat(dist.slice(pos)).map(String);
    return {texte:`Combien d'enfants a ${nomPropre(m)} dans l'arbre ?`, options, bonne:pos};
  }
  return null;
}

function carteDuJour(){
  if(membres.length===0) return "";

  const cartes=[];
  if(evtFamille){

        texte:evtFamille.titre+(jr===0?" — c'est le grand jour !":` — dans ${jr} jour${jr>1?"s":""} !`)});
  }
  const jmAuj=String(d.getDate()).padStart(2,"0")+"/"+String(d.getMonth()+1).padStart(2,"0");
  for(const m of membres.filter(x=>!x.decede && x.jm===jmAuj))
    cartes.push({icone:"🎂",titre:"Anniversaire aujourd'hui !",
      texte:nomPropre(m)+(m.annee?` fête ses ${d.getFullYear()-(+m.annee)} ans`:"")+" — pense à lui souhaiter !"});
  for(const m of membres.filter(x=>x.decede && x.jm===jmAuj && x.annee))
    cartes.push({icone:"🕊",titre:"Souvenir du jour",
      texte:`Il y a ${d.getFullYear()-(+m.annee)} ans, jour pour jour, naissait ${nomPropre(m)}.`});
  const mj=membres[seed%membres.length];
  cartes.push({icone:"⭐",titre:"Membre du jour",
    texte:nomPropre(mj)+(mj.annee?` · né(e) en ${mj.annee}`:"")+(mj.lieu?` · vit à ${mj.lieu}`:"")+(mj.notes?` — ${mj.notes}`:"")});
  if(recits.length>0){
    const r=recits[seed%recits.length];
    cartes.push({icone:"📖",titre:"Récit du jour",texte:r.titre+(r.annee?` (${r.annee})`:"")});
  }
  if(membres.length>=4){
    const a=membres[seed%membres.length];
    let b=membres[(seed*7+3)%membres.length];
    if(b.id===a.id) b=membres[(seed*7+4)%membres.length];
    if(b.id!==a.id){
      const r=lien(a.id,b.id);
      if(r && r.ancetre) cartes.push({icone:"🔗",titre:"Le saviez-vous ?",texte:r.texte});
    }
  }
  const c=cartes[etat.decouverteIndex%cartes.length];
  return `<button class="carte" style="width:100%;text-align:left;margin-bottom:12px;cursor:pointer;
    border-left:4px solid var(--laiton);font-family:inherit;color:inherit"
    onclick="etat.decouverteIndex++;rendre()">

      ${c.icone} ${c.titre} <span style="float:right">↻</span></div>
    <div style="margin-top:4px;font-size:14.5px;line-height:1.4">${ech(c.texte)}</div>
  </button>`;
}

    if(enfants.length===0){ positions[id]={x:prochainX++, y:prof}; return positions[id].x; }
    const xs=enfants.map(e=>poser(e.id,prof+1));
    const x=(Math.min(...xs)+Math.max(...xs))/2;
    positions[id]={x, y:prof};
    return x;
  }
  for(const r of membres.filter(m=>!m.parentId)){ poser(r.id,0); prochainX++; }
  return positions;
}

function vueGraphique(){
  const pos=calculerLayout();
  const EX=84, EY=104;
  let maxX=0, maxY=0;
  for(const id in pos){ if(pos[id].x>maxX) maxX=pos[id].x; if(pos[id].y>maxY) maxY=pos[id].y; }
  const largeur=(maxX+1)*EX+60, hauteur=(maxY+1)*EY+50;
  let svg=`<defs>`;
  for(const m of membres.filter(x=>x.photo && pos[x.id])){
    const c=pos[m.id];
    svg+=`<clipPath id="cl-${m.id}"><circle cx="${c.x*EX+40}" cy="${c.y*EY+40}" r="15"/></clipPath>`;
  }
  svg+=`</defs>`;
  // Traits de filiation
  for(const m of membres){
    if(!m.parentId || !pos[m.id] || !pos[m.parentId]) continue;
    const a=pos[m.parentId], b=pos[m.id];
    const ax=a.x*EX+40, ay=a.y*EY+40, bx=b.x*EX+40, by=b.y*EY+40;
    const mi=(ay+by)/2;
    svg+=`<path d="M${ax},${ay+17} L${ax},${mi} L${bx},${mi} L${bx},${by-17}"
      fill="none" stroke="#C9962E" stroke-width="1.6"/>`;
  }
  // Membres
  for(const m of membres){
    const c=pos[m.id]; if(!c) continue;
    const cx=c.x*EX+40, cy=c.y*EY+40;
    const prenom=nomPropre(m).split(/\s+/)[0];
    svg+=`<g onclick="choisirDepuisArbre('${m.id}')" style="cursor:pointer">`;
    if(m.photo){
      svg+=`<image href="${m.photo}" x="${cx-15}" y="${cy-15}" width="30" height="30" clip-path="url(#cl-${m.id})"/>
        <circle cx="${cx}" cy="${cy}" r="15" fill="none" stroke="#C9962E" stroke-width="1.6"/>`;
    } else {
      svg+=`<circle cx="${cx}" cy="${cy}" r="15" fill="${m.genre==="F"?"#7A4A6B":"#3E5A78"}"/>
        <text x="${cx}" y="${cy+4}" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">${ech((prenom[0]||"?").toUpperCase())}</text>`;
    }
    svg+=`<text x="${cx}" y="${cy+30}" text-anchor="middle" font-size="9.5" fill="currentColor">${ech(prenom)}${m.decede?" 🕊":""}</text>`;
    if(m.annee) svg+=`<text x="${cx}" y="${cy+40}" text-anchor="middle" font-size="8" fill="#8B8371">${ech(m.annee)}</text>`;
    svg+=`</g>`;
  }
  return `<p class="aide">Glisse pour te déplacer, zoome avec + et −, touche un membre pour voir sa lignée.</p>
  <div style="position:relative">
    <div style="height:420px;overflow:hidden;background:var(--carte);border:1px solid var(--bord);
      border-radius:12px;touch-action:none"
      onpointerdown="arbreDown(event)" onpointermove="arbreMove(event)"
      onpointerup="arbreUp()" onpointercancel="arbreUp()" onpointerleave="arbreUp()">
      <svg width="100%" height="100%" viewBox="0 0 ${Math.max(360,largeur)} 420" style="color:var(--encre)">
        <g id="g-arbre" transform="translate(${gPanX},${gPanY}) scale(${gZoom})">${svg}</g>
      </svg>
    </div>
    <div style="position:absolute;right:10px;bottom:10px;display:flex;flex-direction:column;gap:6px">
      <button class="bouton-genre" style="flex:none;width:40px;height:40px;font-size:18px" onclick="arbreZoom(1.25)">+</button>
      <button class="bouton-genre" style="flex:none;width:40px;height:40px;font-size:18px" onclick="arbreZoom(0.8)">−</button>
    </div>
  </div>`;
}

function vueArbre(){
  const racines=membres.filter(m=>!m.parentId);
  if(racines.length===0) return `<div class="vide">Aucun fondateur. Allez dans « Membres » pour ajouter la première personne (sans parent).</div>`;
  let entete=carteDuJour();
  entete+=carteQuestionJour();
  entete+=`<div class="rangee mb10">
    <button class="bouton-genre ${etat.modeArbre==='liste'?'actif':''}" onclick="etat.modeArbre='liste';rendre()">☰ Liste</button>
    <button class="bouton-genre ${etat.modeArbre==='graph'?'actif':''}" onclick="etat.modeArbre='graph';rendre()">🌳 Graphique</button>
  </div>`;
  if(etat.modeArbre==="graph") return entete+vueGraphique();
  const q=normaliser(etat.rechercheArbre);
  let filtre=null;
  if(q){ filtre=new Set();
    for(const m of membres){ if(normaliser(m.nom).includes(q)){ filtre.add(m.id);
      for(const a of ancetresDe(m.id)) filtre.add(a); } } }
  let html=entete+`<input class="champ mb10" value="${ech(etat.rechercheArbre)}" placeholder="Rechercher un membre dans l'arbre…"
    oninput="etat.rechercheArbre=this.value;rendre();document.querySelector('main input').focus();
    document.querySelector('main input').setSelectionRange(this.value.length,this.value.length)">`;
  if(filtre && filtre.size===0) return html+`<div class="vide">Aucun membre ne correspond à cette recherche.</div>`;
  html+=`<p class="aide">Touchez un nom pour ouvrir ou fermer sa branche.</p>`;
  for(const r of racines){ if(filtre && !filtre.has(r.id)) continue; html+=branche(r,0,filtre,q); }
  return html;
}
function branche(m,niveau,filtre,q){
  const enfants=membres.filter(x=>x.parentId===m.id && (!filtre||filtre.has(x.id)));
  const total=membres.filter(x=>x.parentId===m.id).length;
  const cle=m.id;
  if(etat.ouvertes[cle]===undefined) etat.ouvertes[cle]=niveau<2;
  const ouvert = filtre ? true : etat.ouvertes[cle];
  const surligne = q && normaliser(m.nom).includes(q);
  let html=`<div class="branche ${niveau===0?'racine':''}">
    <button class="noeud ${surligne?'surligne':''}" onclick="etat.ouvertes['${cle}']=!etat.ouvertes['${cle}'];rendre()">
      ${badge(m)}<span style="font-weight:600">${nomComplet(m)}</span>
      ${total>0?`<span class="compteur">${ouvert?"▾":"▸"} ${total}</span>`:""}
    </button>`;
  if(ouvert) for(const e of enfants) html+=branche(e,niveau+1,filtre,q);
  return html+`</div>`;
}

// — Chercheur de membre réutilisable —
const chercheurs={};
function chercheur(id, valeur, onChoisir, placeholder){
  if(!chercheurs[id]) chercheurs[id]={texte:"",ouvert:!valeur};
  const c=chercheurs[id];
  const choisi=membres.find(m=>m.id===valeur);
  if(choisi && !c.ouvert){
    return `<div class="chip">${badge(choisi)}<span style="flex:1;font-weight:600">${nomComplet(choisi)}</span>
      <button class="bouton-retirer" onclick="${onChoisir}('');chercheurs['${id}'].ouvert=true;rendre()">Changer</button></div>`;
  }
  const q=normaliser(c.texte);
  const res=(q?membres.filter(m=>normaliser(m.nom).includes(q)):membres).slice(0,q?12:8);
  let html=`<input class="champ" id="ch-${id}" value="${ech(c.texte)}" placeholder="${ech(placeholder)}"
    oninput="chercheurs['${id}'].texte=this.value;chercheurs['${id}'].ouvert=true;rendre();
    (function(){const e=document.getElementById('ch-${id}');e.focus();e.setSelectionRange(e.value.length,e.value.length)})()">`;
  if(c.ouvert){
    html+=`<div class="liste-resultats">`;
    if(res.length===0) html+=`<div style="padding:12px;font-size:13.5px;color:var(--gris)">Aucun membre trouvé.</div>`;
    for(const m of res) html+=`<button class="ligne-resultat"
      onclick="${onChoisir}('${m.id}');chercheurs['${id}'].ouvert=false;chercheurs['${id}'].texte='';rendre()">
      ${badge(m)}<span>${nomComplet(m)}</span></button>`;
    html+=`</div>`;
  }
  return html;
}

// — Famille : statistiques + archives —
function vueFamille(){
  const branchesLivret=membres.filter(x=>x.parentId && chemin(x.id).length===2);
  let html=carteDashboard();
  html+=carteNiveau();
  html+=`<div class="rangee" style="margin:0 0 14px">
    <button class="bouton-principal" style="margin:0;flex:1;font-size:13.5px" onclick="${branchesLivret.length>=2?"etat.choixLivret=!etat.choixLivret;rendre()":"afficherLivret('')"}">📖 Livret</button>
    <button class="bouton-principal" style="margin:0;flex:1;font-size:13.5px" onclick="ouvrirDiapo()">▶ Réunion</button>
    <button class="bouton-principal" style="margin:0;flex:1;font-size:13.5px" onclick="ouvrirDecouverte()">🃏 Découverte</button>
  </div>`;
  if(etat.choixLivret){
    html+=`<div class="carte" style="margin-bottom:14px">
      <div style="font-weight:700;margin-bottom:8px">Quel livret générer ?</div>
      <button class="bouton-genre" style="width:100%;margin-bottom:6px" onclick="afficherLivret('')">📖 Livret complet (toute la famille)</button>
      ${branchesLivret.map(b=>`<button class="bouton-genre" style="width:100%;margin-bottom:6px" onclick="afficherLivret('${b.id}')">🌿 Branche de ${ech(nomPropre(b))} (${1+nbDescendants(b.id)} membres)</button>`).join("")}
    </div>`;
  }
  html+=carteEvenement();
  html+=carteMission();
  html+=carteJournal();
  html+=carteSemaine();
  html+=carteRecords();
  html+=carteADecouvrir();
  html+=carteQuiz();
  html+=carteDuel();
  html+=carteBadges();
  html+=carteRappel();
  html+=carteAvatarFamille();
  html+=carteReglages();
  html+=carteChangelog();
  html+=carteAdmin();
  html+=`<div class="carte">
    <div style="font-weight:700;margin-bottom:10px">Statistiques de la famille</div>`;
  if(membres.length===0){
    html+=`<div class="vide">Aucun membre pour l'instant.</div></div>`;
  } else {
    const total=membres.length;
    const vivants=membres.filter(m=>!m.decede).length;
    const hommes=membres.filter(m=>m.genre==="H").length;
    const generations={};
    let plusAncien=null, plusJeune=null;
    for(const m of membres){
      const g=chemin(m.id).length;
      generations[g]=(generations[g]||0)+1;
      if(m.annee && /^\d{4}$/.test(m.annee)){
        if(!plusAncien || +m.annee < +plusAncien.annee) plusAncien=m;
        if(!plusJeune || +m.annee > +plusJeune.annee) plusJeune=m;
      }
    }
    html+=`<div class="ligne-fiche"><b>Membres :</b> ${total} (${vivants} vivant${vivants>1?"s":""}, ${total-vivants} décédé${total-vivants>1?"s":""})</div>
      <div class="ligne-fiche"><b>Hommes / Femmes :</b> ${hommes} / ${total-hommes}</div>`;
    if(plusAncien) html+=`<div class="ligne-fiche"><b>Naissance la plus ancienne :</b> ${ech(plusAncien.nom)} (${ech(plusAncien.annee)})</div>`;
    if(plusJeune) html+=`<div class="ligne-fiche"><b>Naissance la plus récente :</b> ${ech(plusJeune.nom)} (${ech(plusJeune.annee)})</div>`;
    html+=`<div class="ligne-fiche" style="margin-top:12px"><b>Membres par génération :</b></div>`;
    const maxGen=Math.max(...Object.values(generations));
    const gens=Object.keys(generations).map(Number).sort((a,b)=>a-b);
    for(const g of gens){
      const n=generations[g];
      const largeur=Math.max(8, Math.round(n/maxGen*100));
      html+=`<div style="display:flex;align-items:center;gap:8px;margin-top:6px">
        <span style="font-size:12.5px;color:var(--gris);width:38px;flex-shrink:0">Gén. ${g}</span>
        <div style="flex:1;background:var(--barre);border-radius:6px;overflow:hidden">
          <div style="width:${largeur}%;background:var(--laiton);border-radius:6px;
            padding:4px 8px;font-size:12.5px;font-weight:700;color:var(--encre);min-width:24px">${n}</div>
        </div></div>`;
    }
    html+=`</div>`;
  }

  // Les branches de la famille (les enfants du fondateur et leur descendance)
  const enfantsFondateur=membres.filter(x=>x.parentId && chemin(x.id).length===2);
  if(enfantsFondateur.length>=2){
    const tailles=enfantsFondateur.map(b=>({b, n:1+nbDescendants(b.id)})).sort((x,y)=>y.n-x.n);
    const maxB=tailles[0].n;
    html+=`<div class="carte mt18"><div style="font-weight:700;margin-bottom:4px">🌿 Les branches de la famille</div>
      <p class="aide">La descendance de chaque enfant du fondateur :</p>`;
    for(const {b,n} of tailles){
      const largeur=Math.max(12, Math.round(n/maxB*100));
      html+=`<div style="display:flex;align-items:center;gap:8px;margin-top:7px">
        <span style="font-weight:600;font-size:13.5px;width:92px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${ech(nomPropre(b).split(" ")[0])}</span>
        <div style="flex:1;background:var(--barre);border-radius:6px;overflow:hidden">
          <div style="width:${largeur}%;background:var(--laiton);border-radius:6px;padding:3px 8px;font-size:12px;font-weight:700;min-width:22px">${n}</div>
        </div></div>`;
    }
    html+=`</div>`;
  }

  // Prénoms transmis de génération en génération
  const prenoms={};
  for(const m of membres){
    const pr=nomPropre(m).split(/\s+/)[0];
    if(pr && pr.length>=2) prenoms[pr]=(prenoms[pr]||0)+1;
  }
  const transmis=Object.entries(prenoms).filter(e=>e[1]>=2).sort((a,b)=>b[1]-a[1]);
  html+=`<div class="carte mt18"><div style="font-weight:700;margin-bottom:4px">Les prénoms de la famille</div>`;
  if(transmis.length===0){
    html+=`<p class="aide" style="margin:0">Quand un prénom sera porté par plusieurs membres, il apparaîtra ici — c'est ainsi qu'on repère les traditions de nommage.</p>`;
  } else {
    html+=`<p class="aide">Prénoms portés par plusieurs membres — les traditions de nommage de la famille :</p>`;
    for(const [pr,n] of transmis){
      html+=`<div class="ligne-fiche">✨ <b>${ech(pr)}</b> — porté par ${n} membres</div>`;
    }
  }
  html+=`</div>`;

  // Où vit la famille : regroupement des vivants par ville
  const villes={};
  for(const m of membres.filter(x=>!x.decede && x.lieu)){
    const cle2=m.lieu.trim();
    if(!villes[cle2]) villes[cle2]=[];
    villes[cle2].push(nomPropre(m));
  }
  const listeVilles=Object.entries(villes).sort((a,b)=>b[1].length-a[1].length);
  html+=`<div class="carte mt18"><div style="font-weight:700;margin-bottom:4px">📍 Où vit la famille</div>`;
  if(listeVilles.length===0){
    html+=`<p class="aide" style="margin:0">Ajoutez la ville de chaque membre (champ « Ville » du formulaire) pour voir la carte des branches ici.</p>`;
  } else {
    const maxV=listeVilles[0][1].length;
    for(const [ville,noms] of listeVilles){
      const largeur=Math.max(12, Math.round(noms.length/maxV*100));
      html+=`<div style="margin-top:8px">
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-weight:600;font-size:14px">${ech(ville)}</span>
          <div style="flex:1;background:var(--barre);border-radius:6px;overflow:hidden">
            <div style="width:${largeur}%;background:var(--laiton);border-radius:6px;padding:3px 8px;font-size:12px;font-weight:700;min-width:22px">${noms.length}</div>
          </div></div>
        <div style="font-size:12.5px;color:var(--gris);margin-top:2px">${ech(noms.join(", "))}</div>
      </div>`;
    }
  }
  html+=`</div>`;

  // Frise chronologique : naissances + récits datés, dans l'ordre du temps
  const evenements=[];
  for(const m of membres){
    if(m.annee && /^\d{4}$/.test(m.annee))
      evenements.push({annee:+m.annee, icone:"👶", texte:"Naissance de "+m.nom+(m.parentId?"":" (fondateur)")});
  }
  for(const m of membres){
    if(m.decede && m.anneeDeces && /^\d{4}$/.test(m.anneeDeces))
      evenements.push({annee:+m.anneeDeces, icone:"🕊", texte:"Décès de "+m.nom});
  }
  for(const r of recits){
    if(r.annee && /^\d{4}$/.test(r.annee))
      evenements.push({annee:+r.annee, icone:"📖", texte:r.titre});
  }
  evenements.sort((a,b)=>a.annee-b.annee);
  html+=`<div class="carte mt18"><div style="font-weight:700;margin-bottom:4px">Frise chronologique</div>`;
  if(evenements.length===0){
    html+=`<p class="aide" style="margin:0">Ajoutez des années de naissance et des récits datés pour voir l'histoire de la famille se dérouler ici.</p>`;
  } else {
    html+=`<p class="aide">L'histoire de la famille, année par année : naissances 👶 et récits des archives 📖.</p>`;
    for(const ev of evenements){
      html+=`<div style="border-left:2px solid var(--laiton);padding:4px 0 4px 12px;margin-left:6px">
        <span style="font-weight:700">${ev.annee}</span> — ${ev.icone} ${ech(ev.texte)}</div>`;
    }
  }
  html+=`</div>`;

  // Anniversaires à venir (membres vivants avec jour/mois connus)
  const vivantsJM=membres.filter(m=>!m.decede&&m.jm);
  html+=`<div class="carte mt18"><div style="font-weight:700;margin-bottom:4px">Anniversaires à venir</div>`;
  if(vivantsJM.length===0){
    html+=`<p class="aide" style="margin:0">Ajoutez des dates de naissance complètes (ex. 12/08/1985) pour voir apparaître les prochains anniversaires ici.</p>`;
  } else {
    const auj=new Date();
    const auj0=new Date(auj.getFullYear(),auj.getMonth(),auj.getDate());
    const prochains=vivantsJM.map(m=>{
      const [j,mo]=m.jm.split("/").map(Number);
      let d=new Date(auj.getFullYear(),mo-1,j);
      if(d<auj0) d=new Date(auj.getFullYear()+1,mo-1,j);
      const dans=Math.round((d-auj0)/86400000);
      const age=m.annee?d.getFullYear()-(+m.annee):null;
      return {m,dans,age};
    }).sort((a,b)=>a.dans-b.dans).slice(0,5);
    for(const p2 of prochains){
      html+=`<div class="ligne-fiche">🎂 <b>${ech(p2.m.nom)}</b> — ${ech(p2.m.jm)} ${p2.dans===0?"(c'est aujourd'hui !)":`(dans ${p2.dans} jour${p2.dans>1?"s":""})`}${p2.age?` — ${p2.age} ans`:""}</div>`;
    }
  }
  html+=`</div>`;

  html+=`<div class="carte mt18">
    <div style="font-weight:700;margin-bottom:4px">Archives de la famille</div>
    <p class="aide">Récits, souvenirs et histoires à transmettre : l'histoire du fondateur, les grands événements, les traditions…</p>
    <input class="champ mb10" id="recit-titre" placeholder="Titre du récit (ex. L'histoire du fondateur)">
    <input class="champ mb10" id="recit-annee" inputmode="numeric" placeholder="Année de l'événement (ex. 1995, facultatif)">
    <textarea class="champ" id="recit-texte" rows="4" placeholder="Racontez ici… (ex. Alhadji Oumarou est né en 1918. Parti de Maroua avec quelques bêtes, il a bâti la concession familiale…)"></textarea>
    ${etat.enregistrement
      ?`<div style="margin:10px 0">
          ${typeCapture==="video"?`<video id="apercu-video" playsinline muted style="width:100%;max-height:220px;border-radius:10px;background:#000"></video>`:""}
          <div class="rangee" style="align-items:center;margin-top:8px">
            <span id="chrono-audio" class="message" style="flex:1;margin-top:0">🔴 Enregistrement…</span>
            <button class="bouton-genre" style="flex:0 0 auto;padding:10px 14px" onclick="arreterAudio()">◼ Arrêter</button>
          </div>
        </div>`
      :`${etat.audioRecit
          ?`<div style="margin:10px 0">${baliseMedia(etat.audioRecit,"audio")}
             <button class="bouton-secondaire" onclick="if(etat.audioRecit.indexOf('idb:')===0)effacerMedia(etat.audioRecit.slice(4));etat.audioRecit=null;etat.messageRecit='';rendre()">Supprimer l'audio</button></div>`
          :""}
        ${etat.videoRecit
          ?`<div style="margin:10px 0">${baliseMedia(etat.videoRecit,"video")}
             <button class="bouton-secondaire" onclick="if(etat.videoRecit.indexOf('idb:')===0)effacerMedia(etat.videoRecit.slice(4));etat.videoRecit=null;etat.messageRecit='';rendre()">Supprimer la vidéo</button></div>`
          :""}
        <div class="rangee" style="margin:10px 0">
          ${etat.audioRecit?"":`<button class="bouton-genre" onclick="demarrerAudio()">🎙 Audio (jusqu'à 3 h)</button>`}
          ${etat.videoRecit?"":`<button class="bouton-genre" onclick="demarrerVideo()">🎥 Vidéo (jusqu'à 2 h)</button>`}
        </div>`}
    <button class="bouton-principal" onclick="ajouterRecit()">Ajouter aux archives</button>
    ${etat.messageRecit?`<div class="message">${ech(etat.messageRecit)}</div>`:""}
  </div>`;

  html+=`<div class="mt18"><div style="font-weight:700;margin-bottom:8px">Récits (${recits.length})</div>
    <input class="champ mb10" value="${ech(etat.rechercheRecits)}" placeholder="Rechercher dans les récits (ex. Aïd, Ibrahim…)"
      oninput="etat.rechercheRecits=this.value;rendre()">`;
  const qr=normaliser(etat.rechercheRecits);
  const recitsFiltres=recits.filter(r=>!qr||normaliser(r.titre+" "+r.texte).includes(qr));
  if(recits.length===0) html+=`<div class="vide">Aucun récit pour l'instant. Le premier pourrait être l'histoire du fondateur !</div>`;
  else if(recitsFiltres.length===0) html+=`<div class="vide">Aucun récit ne correspond à cette recherche.</div>`;
  for(const r of recitsFiltres){
    const ouvert=etat.recitOuvert===r.id;
    html+=`<div class="carte-membre">
      <button class="ligne-membre" onclick="etat.recitOuvert=${ouvert?"null":`'${r.id}'`};rendre()">
        <span style="flex:1;text-align:left;font-weight:600">${r.annee?`<span class="annee">${ech(r.annee)} · </span>`:""}${ech(r.titre)}${r.audio?" 🎙":""}${r.video?" 🎥":""}</span>
        <span class="compteur">${r.date?ech(r.date)+" · ":""}${ouvert?"▾":"▸"}</span></button>`;
    if(ouvert){

      html+=`<div class="fiche">

    }
    html+=`</div>`;
  }
  html+=`</div>`;
  return html;
}
// Stockage étendu du navigateur pour les médias longs (audio/vidéo)
let bdMedias=null;
function ouvrirBD(){
  return new Promise(function(res){
    if(bdMedias) return res(bdMedias);
    if(typeof indexedDB==="undefined") return res(null);
    try{
      const req=indexedDB.open("famille-medias",1);
      req.onupgradeneeded=function(){ req.result.createObjectStore("medias"); };
      req.onsuccess=function(){ bdMedias=req.result; res(bdMedias); };
      req.onerror=function(){ res(null); };
    }catch(e){ res(null); }
  });
}
async function sauverMedia(id,blob){
  const b=await ouvrirBD(); if(!b) return false;
  return new Promise(function(res){
    try{
      const tx=b.transaction("medias","readwrite");
      tx.objectStore("medias").put(blob,id);
      tx.oncomplete=function(){ res(true); };
      tx.onerror=function(){ res(false); };
    }catch(e){ res(false); }
  });
}
async function lireMedia(id){
  const b=await ouvrirBD(); if(!b) return null;
  return new Promise(function(res){
    try{
      const tx=b.transaction("medias","readonly");
      const rq=tx.objectStore("medias").get(id);
      rq.onsuccess=function(){ res(rq.result||null); };
      rq.onerror=function(){ res(null); };
    }catch(e){ res(null); }
  });
}
async function effacerMedia(id){
  const b=await ouvrirBD(); if(!b) return;
  try{ b.transaction("medias","readwrite").objectStore("medias").delete(id); }catch(e){}
}
const urlsMedias={};
async function resoudreMedias(){
  if(!document.querySelectorAll) return;
  const els=document.querySelectorAll("[data-idb]");
  for(const el of els){
    const id=el.getAttribute("data-idb");
    if(!id || el.src) continue;
    if(urlsMedias[id]){ el.src=urlsMedias[id]; continue; }
    const blob=await lireMedia(id);
    if(blob && typeof URL!=="undefined" && URL.createObjectURL){
      urlsMedias[id]=URL.createObjectURL(blob);
      el.src=urlsMedias[id];
    }
  }
}
function baliseMedia(ref,type){
  const commun=type==="video"
    ?'controls playsinline style="width:100%;border-radius:10px;margin-top:8px;max-height:260px;background:#000"'
    :'controls style="width:100%;margin-top:8px"';
  const balise=type==="video"?"video":"audio";
  if(ref && ref.indexOf("idb:")===0)
    return `<${balise} ${commun} data-idb="${ref.slice(4)}"></${balise}>`;
  return `<${balise} ${commun} src="${ref}"></${balise}>`;
}
function formatDuree(sec){
  const h=Math.floor(sec/3600), mn=Math.floor((sec%3600)/60), sc=sec%60;
  if(h) return h+" h "+String(mn).padStart(2,"0")+" min";
  if(mn) return mn+" min "+String(sc).padStart(2,"0")+" s";
  return sc+" s";
}

let mediaRec=null, morceauxAudio=[], chronoAudio=null, secondesAudio=0, typeCapture="audio", fluxCapture=null;
async function demarrerCapture(type){
  typeCapture=type;
  if(!(navigator.mediaDevices && navigator.mediaDevices.getUserMedia) || typeof MediaRecorder==="undefined"){
    etat.messageRecit="L'enregistrement n'est pas pris en charge par ce navigateur.";
    rendre(); return;
  }
  try{
    const contraintes=type==="video"?{video:{facingMode:"environment"},audio:true}:{audio:true};
    const flux=await navigator.mediaDevices.getUserMedia(contraintes);
    fluxCapture=flux;
    morceauxAudio=[];
    mediaRec=new MediaRecorder(flux);
    mediaRec.ondataavailable=function(e){ if(e.data && e.data.size) morceauxAudio.push(e.data); };
    mediaRec.onstop=async function(){
      flux.getTracks().forEach(function(t){ t.stop(); });
      fluxCapture=null;
      const blob=new Blob(morceauxAudio,{type:mediaRec.mimeType||(typeCapture==="video"?"video/webm":"audio/webm")});
      if(blob.size<700000){
        const lecteur=new FileReader();
        lecteur.onload=function(){
          if(typeCapture==="video") etat.videoRecit=lecteur.result; else etat.audioRecit=lecteur.result;
          etat.messageRecit=(typeCapture==="video"?"🎥 Vidéo":"🎙 Audio")+" enregistré ("+formatDuree(secondesAudio)+"). Sera joint au récit.";
          rendre();
        };
        lecteur.readAsDataURL(blob);
      } else {
        const idm=(typeCapture==="video"?"v":"a")+Date.now();
        const ok=await sauverMedia(idm,blob);
        if(ok){
          if(typeCapture==="video") etat.videoRecit="idb:"+idm; else etat.audioRecit="idb:"+idm;
          etat.messageRecit=(typeCapture==="video"?"🎥 Vidéo":"🎙 Audio")+" enregistré ("+formatDuree(secondesAudio)+", "+Math.round(blob.size/1048576)+" Mo) dans le stockage étendu.";
        } else {
          etat.messageRecit="Le stockage étendu n'est pas disponible — cet enregistrement est trop lourd pour être conservé.";
        }
        rendre();
      }
    };
    mediaRec.start(1000);
    etat.enregistrement=true; secondesAudio=0;
    const limite=type==="video"?7200:10800; // 2 h vidéo, 3 h audio
    chronoAudio=setInterval(function(){
      secondesAudio++;
      const e=document.getElementById("chrono-audio");
      if(e) e.textContent="🔴 "+(typeCapture==="video"?"Vidéo":"Audio")+"… "+formatDuree(secondesAudio)+" / "+formatDuree(limite);
      if(secondesAudio>=limite) arreterAudio();
    },1000);
    rendre();
  }catch(e){
    etat.messageRecit="Impossible d'accéder au "+(type==="video"?"micro et à la caméra":"micro")+" (permission refusée ?).";
    rendre();
  }
}

function melanger(a){
  const t=[...a];
  for(let i=t.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [t[i],t[j]]=[t[j],t[i]]; }
  return t;
}
function genererQuestions(){
  const p=parId(); const pool=[];
  for(const m of membres.filter(x=>x.parentId && p[x.parentId])){
    const autres=melanger(membres.filter(x=>x.id!==m.parentId && x.id!==m.id)).slice(0,3).map(x=>x.nom);
    if(autres.length>=3){
      const opts=melanger([p[m.parentId].nom, ...autres]);
      pool.push({texte:`Qui est le parent de ${m.nom} dans l'arbre ?`, options:opts, bonne:opts.indexOf(p[m.parentId].nom)});
    }
  }
  for(const m of membres.filter(x=>x.annee && /^\d{4}$/.test(x.annee))){
    const an=+m.annee;
    const opts=melanger([an, an+3, an-4, an+7].map(String));
    pool.push({texte:`En quelle année est né(e) ${m.nom} ?`, options:opts, bonne:opts.indexOf(String(an))});
  }
  for(const m of membres){
    const n=membres.filter(x=>x.parentId===m.id).length;
    if(n>=1){
      const opts=melanger([Math.max(0,n-1), n, n+1, n+2].map(String));
      pool.push({texte:`Combien d'enfants a ${m.nom} dans l'arbre ?`, options:opts, bonne:opts.indexOf(String(n))});
    }
  }
  const maxG=profondeurMax();
  if(maxG>=3){
    for(const m of melanger(membres).slice(0,6)){
      const g=chemin(m.id).length;
      const opts=[]; for(let i=1;i<=Math.max(4,maxG);i++) opts.push(String(i));
      pool.push({texte:`À quelle génération appartient ${m.nom} ? (1 = fondateur)`, options:opts.slice(0,4), bonne:g<=4?g-1:3});
    }
  }
  return melanger(pool).slice(0,5);
}

const TITRES_NIVEAU=["Éveillé(e)","Apprenti(e) de la mémoire","Conteur/Conteuse","Griot(te)",

function cleSemaine(){
  const d=new Date();
  const debut=new Date(d.getFullYear(),0,1);
  return d.getFullYear()+"-S"+Math.floor((d-debut)/86400000/7);
}
function gagnerXP(n,label){
  const avant=niveauDe(xpTotal);
  xpTotal+=n;
  try{ localStorage.setItem(CLE_XP,String(xpTotal)); }catch(e){}
  try{
    let sem=JSON.parse(localStorage.getItem(CLE_XPSEM))||{};
    if(sem.cle!==cleSemaine()) sem={cle:cleSemaine(), xp:0};
    sem.xp+=n;
    localStorage.setItem(CLE_XPSEM,JSON.stringify(sem));
  }catch(e){}
  try{
    let jr=JSON.parse(localStorage.getItem(CLE_XPJOUR))||{};
    if(jr.date!==dateISO(new Date())) jr={date:dateISO(new Date()), xp:0};
    jr.xp+=n;
    localStorage.setItem(CLE_XPJOUR,JSON.stringify(jr));
    if(jr.xp>(+localStorage.getItem(CLE_XPJOUR_RECORD)||0)) localStorage.setItem(CLE_XPJOUR_RECORD,String(jr.xp));
  }catch(e){}
  const apres=niveauDe(xpTotal);
  if(apres>avant) toastNiveau(apres); else toast(`⚡ +${n} XP · ${label}`);
}

    if(m.decede && !m.anneeDeces) l.push({texte:`Renseigner l'année du décès de ${nomPropre(m)}`, id:m.id});
  }
  if(recits.length<5) l.push({texte:"Écrire un nouveau récit dans les archives", id:null});
  return l;
}
function missionDuJour(){
  const l=missionsPossibles();
  if(l.length===0) return null;
  const d=new Date();
  const seed=d.getFullYear()*372+(d.getMonth()+1)*31+d.getDate();
  return l[seed%l.length];
}

function construireLivret(filtreId){
  let inclus=membres, setInclus=null, sousTitreBranche="";
  if(filtreId){
    const b=membres.find(x=>x.id===filtreId);
    setInclus=new Set(membres.filter(x=>!x.parentId).map(x=>x.id));
    setInclus.add(filtreId);
    const ajouterDesc=function(id){
      for(const m of membres.filter(x=>x.parentId===id)){ setInclus.add(m.id); ajouterDesc(m.id); }
    };
    ajouterDesc(filtreId);
    inclus=membres.filter(x=>setInclus.has(x.id));
    sousTitreBranche=b?"Branche de "+nomPropre(b):"";
  }
  const recitsInclus=filtreId?recits.filter(r=>membresDuRecit(r).some(m=>setInclus.has(m.id))):recits;
  const d=new Date();
  const dateStr=String(d.getDate()).padStart(2,"0")+"/"+String(d.getMonth()+1).padStart(2,"0")+"/"+d.getFullYear();
  const p=parId();
  let h=`<div class="no-print" style="display:flex;gap:8px;margin-bottom:16px">
    <button class="bouton-principal" style="margin-top:0" onclick="window.print()">🖨 Imprimer / Enregistrer en PDF</button>
    <button class="bouton-secondaire" style="margin-top:0;width:auto;padding:11px 16px" onclick="fermerLivret()">Retour</button>
  </div>`;

  // Couverture
  let maxGL=1;
  for(const m of inclus){ const pr=chemin(m.id).length; if(pr>maxGL) maxGL=pr; }
  h+=`<div style="text-align:center;padding:70px 0 50px">
    <div style="font-size:36px;font-family:Georgia,serif">Notre famille</div>
    ${sousTitreBranche?`<div style="font-size:18px;font-family:Georgia,serif;color:#6B6250;margin-top:8px">🌿 ${ech(sousTitreBranche)}</div>`:""}
    <div style="width:60px;height:3px;background:var(--laiton);margin:16px auto"></div>
    <div style="color:#6B6250">Livret familial · ${inclus.length} membre${inclus.length>1?"s":""} · ${maxGL} génération${maxGL>1?"s":""}</div>
    <div style="margin-top:6px;color:#6B6250;font-size:12.5px">Généré le ${dateStr}</div>
  </div>`;

  // L'arbre
  h+=`<div class="saut"><h2>L'arbre de la famille</h2>`;
  for(const r of inclus.filter(m=>!m.parentId)) h+=arbreLivret(r,0,setInclus);
  h+=`</div>`;

  // Fiches par génération
  h+=`<div class="saut"><h2>Les membres, génération par génération</h2>`;
  const maxG=maxGL;
  for(let g=1;g<=maxG;g++){
    const gens=inclus.filter(m=>chemin(m.id).length===g)
      .sort((a,b)=>a.nom.localeCompare(b.nom,"fr"));
    if(gens.length===0) continue;
    h+=`<div style="font-weight:700;margin:16px 0 8px;color:#6B6250;text-transform:uppercase;font-size:12px;letter-spacing:1px">Génération ${g}${g===1?" — Fondation":""}</div>`;
    for(const m of gens){
      h+=`<div class="fiche-livret"><div style="display:flex;gap:10px;align-items:flex-start">
        ${m.photo?`<img src="${m.photo}" style="width:48px;height:48px;border-radius:8px;object-fit:cover" alt="">`:""}
        <div style="flex:1">
          <div style="font-weight:700">${ech(m.nom)}</div>
          ${m.annee?`<div style="font-size:12.5px;color:#6B6250">Naissance : ${ech(m.jm?m.jm+"/"+m.annee:m.annee)}${m.decede?" · décès"+(m.anneeDeces?" : "+ech(m.anneeDeces):"")+" 🕊":""}</div>`:""}
          ${m.parentId?`<div style="font-size:12.5px;color:#6B6250">Parent : ${ech(p[m.parentId]?p[m.parentId].nom:"—")}</div>`:""}
          ${m.conjoint?`<div style="font-size:12.5px;color:#6B6250">Conjoint(e) : ${ech(m.conjoint)}</div>`:""}
          ${m.lieu?`<div style="font-size:12.5px;color:#6B6250">Vit à : ${ech(m.lieu)}</div>`:""}
          ${m.notes?`<div style="font-size:12.5px;margin-top:3px">${ech(m.notes)}</div>`:""}
        </div></div></div>`;
    }
  }
  h+=`</div>`;

  // Frise chronologique
  const evenements=[];
  for(const m of inclus){ if(m.annee && /^\d{4}$/.test(m.annee))
    evenements.push({annee:+m.annee,icone:"👶",texte:"Naissance de "+m.nom+(m.parentId?"":" (fondateur)")}); }
  for(const m of inclus){ if(m.decede && m.anneeDeces && /^\d{4}$/.test(m.anneeDeces))
    evenements.push({annee:+m.anneeDeces,icone:"🕊",texte:"Décès de "+m.nom}); }
  for(const r of recitsInclus){ if(r.annee && /^\d{4}$/.test(r.annee))
    evenements.push({annee:+r.annee,icone:"📖",texte:r.titre}); }
  evenements.sort((a,b)=>a.annee-b.annee);
  if(evenements.length>0){
    h+=`<div class="saut"><h2>La frise chronologique</h2>`;
    for(const ev of evenements)
      h+=`<div style="border-left:2px solid var(--laiton);padding:3px 0 3px 12px;margin-left:6px">
        <b>${ev.annee}</b> — ${ev.icone} ${ech(ev.texte)}</div>`;
    h+=`</div>`;
  }

  // Les récits
  if(recitsInclus.length>0){
    h+=`<div class="saut"><h2>Les récits de la famille</h2>`;
    const tries=[...recitsInclus].sort((a,b)=>(a.annee||"9999").localeCompare(b.annee||"9999"));
    for(const r of tries){
      h+=`<div style="margin-bottom:18px;page-break-inside:avoid">
        <div style="font-weight:700;font-family:Georgia,serif;font-size:16px">${r.annee?ech(r.annee)+" — ":""}${ech(r.titre)}</div>
        <div style="white-space:pre-wrap;margin-top:4px">${ech(r.texte)}</div></div>`;
    }
    h+=`</div>`;
  }

  h+=`<div style="text-align:center;color:#6B6250;font-size:12px;margin-top:30px;padding-bottom:20px">
    — Une famille unie est plus solide qu'un mur de pierres —</div>`;
  return h;
}

function enregistrer(){
  const n=etat.form.nom.trim();
  if(!n){ etat.message="Écrivez d'abord le nom du membre."; rendre(); return; }
  const nb=etat.form.naissance.trim();
  let an="", jm="";
  if(nb){
    let x=nb.match(/^(\d{4})$/);
    if(x){ an=x[1]; }
    else{
      x=nb.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
      if(x && +x[1]>=1 && +x[1]<=31 && +x[2]>=1 && +x[2]<=12){
        jm=String(+x[1]).padStart(2,"0")+"/"+String(+x[2]).padStart(2,"0");
        an=x[3];
      } else {
        etat.message="Écrivez la naissance comme 12/08/1985 (jour/mois/année) ou juste 1985.";
        rendre(); return;
      }
    }
  }
  const ad=etat.form.decede?etat.form.anneeDeces.trim():"";
  if(ad && !/^\d{4}$/.test(ad)){ etat.message="L'année du décès doit avoir 4 chiffres (ex. 1998)."; rendre(); return; }
  if(ad && an && +ad<+an){ etat.message="L'année du décès ne peut pas précéder la naissance."; rendre(); return; }
  const pid=etat.form.parentId||null;
  if(etat.enEdition){
    if(pid===etat.enEdition){ etat.message="Un membre ne peut pas être son propre parent."; rendre(); return; }
    if(pid && ancetresDe(pid).has(etat.enEdition)){ etat.message="Impossible : ce parent est un descendant de ce membre."; rendre(); return; }
    membres=membres.map(m=>m.id===etat.enEdition?{...m,nom:n,genre:etat.form.genre,parentId:pid,
      annee:an,jm:jm,decede:etat.form.decede,anneeDeces:ad,conjoint:etat.form.conjoint.trim(),lieu:etat.form.lieu.trim(),notes:etat.form.notes.trim(),photo:etat.form.photo||""}:m);
    etat.message=`${n} a été modifié.`;
    consigner(`${n} a été mis à jour`);
    gagnerXP(5,"Fiche mise à jour");
  } else {
    if(!pid && membres.some(m=>!m.parentId)){ etat.message="Il y a déjà un fondateur — choisissez un parent pour ce membre."; rendre(); return; }
    membres.push({id:"m"+Date.now(),nom:n,genre:etat.form.genre,parentId:pid,
      annee:an,jm:jm,decede:etat.form.decede,anneeDeces:ad,conjoint:etat.form.conjoint.trim(),lieu:etat.form.lieu.trim(),notes:etat.form.notes.trim(),photo:etat.form.photo||""});
    etat.message=`${n} a été ajouté à la famille.`;
    consigner(`${n} a été ajouté à l'arbre`);
    gagnerXP(etat.form.photo?15:10,"Membre ajouté");
  }
  sauvegarder();
  etat.form={nom:"",genre:"H",parentId:"",naissance:"",decede:false,anneeDeces:"",conjoint:"",lieu:"",notes:"",photo:""};
  etat.enEdition=null; chercheurs["parent"]={texte:"",ouvert:true};
  rendre();
}
function chargerPhoto(inp){
  const fichier=inp.files && inp.files[0]; if(!fichier) return;
  const lecteur=new FileReader();
  lecteur.onload=function(){
    const img=new Image();
    img.onload=function(){
      const c=document.createElement("canvas"); c.width=144; c.height=144;
      const ctx=c.getContext("2d");
      const cote=Math.min(img.width,img.height);
      ctx.drawImage(img,(img.width-cote)/2,(img.height-cote)/2,cote,cote,0,0,144,144);
      etat.form.photo=c.toDataURL("image/jpeg",0.75);
      rendre();
    };
    img.src=lecteur.result;
  };
  lecteur.readAsDataURL(fichier);
}

      const np=normaliser(parentNom);
      const trouve=membres.find(x=>normaliser(nomPropre(x))===np) ||
                   membres.find(x=>normaliser(nomPropre(x)).includes(np));
      if(!trouve){ erreurs.push(`Ligne ${i+1} (${nom}) : parent « ${parentNom} » introuvable dans l'arbre.`); return; }
      parentId=trouve.id;
    } else if(membres.some(x=>!x.parentId)){
      erreurs.push(`Ligne ${i+1} (${nom}) : parent manquant (il y a déjà un fondateur).`); return;
    }
    membres.push({id:"m"+Date.now()+"_"+i, nom, genre, parentId,
      annee, jm:"", decede:false, anneeDeces:"", conjoint:"", lieu:ville, notes:"", photo:""});
    ajoutes++;
  });
  if(ajoutes>0){ sauvegarder(); consigner(`${ajoutes} membre${ajoutes>1?"s":""} ajouté${ajoutes>1?"s":""} en série`); gagnerXP(Math.min(50,ajoutes*5),"Ajout en série"); }
  etat.messageSerie=`${ajoutes} membre${ajoutes>1?"s":""} ajouté${ajoutes>1?"s":""}.`+
    (erreurs.length?`\n⚠ ${erreurs.length} ligne${erreurs.length>1?"s":""} non traitée${erreurs.length>1?"s":""} :\n`+erreurs.join("\n"):"");
  if(ajoutes>0 && document.getElementById("zone-serie")) document.getElementById("zone-serie").value="";
  rendre();
}
function telechargerCSV(){
  noterExport();
  const p=parId();
  const lignes=[["Nom","Genre","Parent","Naissance","Deces","Ville","Conjoint","Notes"]];
  for(const m of membres){
    lignes.push([m.nom, m.genre==="F"?"Femme":"Homme",
      m.parentId&&p[m.parentId]?p[m.parentId].nom:"",
      m.jm?m.jm+"/"+m.annee:(m.annee||""), m.anneeDeces||"",
      m.lieu||"", m.conjoint||"", m.notes||""]);
  }
  const csv=lignes.map(l=>l.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(";")).join("\r\n");
  const blob=new Blob(["\ufeff"+csv],{type:"text/csv;charset=utf-8"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="famille.csv";
  a.click();
}
function importer(){
  if(exigerAdmin("importer")) return;
  const z=document.getElementById("zone-import"); if(!z) return;
  try{
    const brut=JSON.parse(z.value.trim());
    const listeM=Array.isArray(brut)?brut:(brut&&Array.isArray(brut.membres)?brut.membres:null);
    if(!listeM) throw new Error();
    const v=listeM.filter(m=>m&&typeof m.id==="string"&&typeof m.nom==="string");
    if(v.length===0) throw new Error();
    membres=v; sauvegarder();
    if(brut && Array.isArray(brut.recits)){
      recits=brut.recits.filter(r=>r&&typeof r.titre==="string"&&typeof r.texte==="string");
      sauvegarderRecits();
    }
    consigner(`Sauvegarde restaurée (${v.length} membres)`);
    etat.sauvMode=""; etat.message=`Sauvegarde restaurée : ${v.length} membre${v.length>1?"s":""} importé${v.length>1?"s":""}.`;
  }catch(e){ etat.message="Ce texte n'est pas une sauvegarde valide. Collez exactement le texte exporté depuis l'application."; }
  rendre();
}

if(typeof navigator!=="undefined" && "serviceWorker" in navigator){

}
if(typeof window!=="undefined" && window.addEventListener){
